<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub Pro V8.0 - Pomodoro Expert</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050a0f; 
            --card-bg: #0f1720; 
            --primary: #a2d2ff; 
            --text: #e1f5fe; 
            --text-dim: #b0bec5;
            --danger: #ff5252;
            --border: #1c2b36;
        }
        
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); font-size: 19px; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: var(--primary); color: #050a0f; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .sidebar { background: #020406; border-bottom: 2px solid var(--border); padding: 15px; display: flex; gap: 12px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; align-items: center; }
        .subject-tab { padding: 12px 24px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 1.1rem; border: 2px solid transparent; background: #1a2a3a; color: var(--text-dim); transition: 0.3s; }
        .subject-tab.active { color: #050a0f; background: var(--primary); border-color: #fff; }
        .special-tab { border: 1px dashed var(--primary); }

        .container { padding: 20px; max-width: 950px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 25px; }
        
        .inner-nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 2px solid var(--border); overflow-x: auto; }
        .inner-nav-item { padding: 15px; cursor: pointer; font-size: 0.9rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }
        .inner-nav-item.active { color: var(--primary); border-bottom: 4px solid var(--primary); }
        
        /* AGENDA */
        .agenda-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .nav-arrow { cursor: pointer; font-size: 1.8rem; color: var(--primary); font-weight: bold; padding: 0 15px; }
        .week-label { font-weight: 700; color: var(--primary); font-size: 1.3rem; text-transform: uppercase; }

        .day-section { margin-bottom: 30px; }
        .day-title { font-weight: 700; font-size: 1.4rem; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: baseline; }
        .day-name { font-size: 0.9rem; opacity: 0.6; text-transform: uppercase; }

        .topic-card { background: #121e2a; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 6px solid; border: 1px solid #1c2b36; border-left-width: 6px; }
        .topic-name { font-weight: 700; font-size: 1.2rem; display: block; margin-bottom: 4px; }
        .subject-name { font-style: italic; font-size: 0.95rem; opacity: 0.8; }

        /* POMODORO EXPERT */
        .pomodoro-box { text-align: center; padding: 10px; }
        .timer-circle { font-size: 6rem; font-weight: 700; color: var(--primary); margin: 15px 0; font-variant-numeric: tabular-nums; }
        .pomo-inputs { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .pomo-group { display: flex; flex-direction: column; align-items: center; }
        .pomo-group label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        .pomo-group input { width: 70px; text-align: center; padding: 10px; margin: 0; }
        .status-msg { font-weight: 700; color: var(--danger); font-size: 1.5rem; height: 35px; margin-bottom: 10px; text-transform: uppercase; }

        .btn { border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: 700; color: #050a0f; width: 100%; margin-top: 10px; font-size: 1.2rem; background: var(--primary); text-transform: uppercase; }
        .timer-btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .t-btn { background: #1a2a3a; color: var(--primary); border: 1px solid var(--primary); padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .t-btn.active { background: var(--primary); color: #050a0f; }
        
        .hidden { display: none !important; }
        input, textarea { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px; border: 2px solid var(--border); background: #020406; color: #fff; font-size: 1.2rem; font-family: 'Roboto'; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="sidebar" id="subjectBar">
    <div class="subject-tab special-tab" id="globalBtn" onclick="activateGlobal()">GLOBALE 🌍</div>
    <div class="subject-tab special-tab" id="pomoBtn" onclick="activatePomodoro()">POMODORO ⏱️</div>
    <button class="add-subject-btn" onclick="promptNewSubject()">+</button>
    <select class="lang-select" id="langPicker" style="background:#1a2a3a; color:white; border:none; padding:10px; border-radius:10px; margin-left:auto;">
        <option value="it">IT 🇮🇹</option>
    </select>
</div>

<div id="appContent" class="container"></div>

<div id="subjectTemplate" class="hidden">
    <button class="btn btn-danger" onclick="applyImprevisto()">⚠️ GESTISCI IMPREVISTO (+1g)</button>
    <div class="inner-nav">
        <div class="inner-nav-item" id="tab-study-btn" onclick="switchSubTab(this, 'study')">STUDIO</div>
        <div class="inner-nav-item" id="tab-ripasso-btn" onclick="switchSubTab(this, 'ripasso')">RIPASSO</div>
        <div class="inner-nav-item" id="tab-calendar-btn" onclick="switchSubTab(this, 'calendar')">AGENDA</div>
        <div class="inner-nav-item" id="tab-history-btn" onclick="switchSubTab(this, 'history')">DATI</div>
    </div>
    <div id="tabContent"></div>
</div>

<script>
    // Stato App
    let data = JSON.parse(localStorage.getItem('studyHubV8')) || { 
        subjects: {}, activeView: 'global', activeSub: null, 
        pomo: { study: 25, break: 5, timeLeft: 1500, isRunning: false, mode: 'study' } 
    };
    let weekOffset = 0;
    let timerTick = null;

    function save() { localStorage.setItem('studyHubV8', JSON.stringify(data)); }
    function showToast(msg) { const x = document.getElementById("toast"); x.innerHTML = msg; x.className = "show"; setTimeout(() => x.className = "", 3000); }

    // Navigazione Principale
    function activateGlobal() { data.activeView = 'global'; save(); render(); }
    function activatePomodoro() { data.activeView = 'pomodoro'; save(); render(); }
    function selectSubject(name) { data.activeView = 'subject'; data.activeSub = name; save(); render(); }

    function render() {
        const bar = document.getElementById('subjectBar');
        bar.querySelectorAll('.subject-tab:not(.special-tab)').forEach(e => e.remove());
        
        document.getElementById('globalBtn').classList.toggle('active', data.activeView === 'global');
        document.getElementById('pomoBtn').classList.toggle('active', data.activeView === 'pomodoro');

        Object.keys(data.subjects).forEach(sub => {
            const btn = document.createElement('div');
            btn.className = `subject-tab ${ (data.activeView === 'subject' && data.activeSub === sub) ? 'active' : '' }`;
            btn.innerHTML = `${sub} <span onclick="event.stopPropagation(); editSubject('${sub}')">⚙️</span>`;
            btn.onclick = () => selectSubject(sub);
            bar.insertBefore(btn, document.getElementById('langPicker'));
        });

        const container = document.getElementById('appContent');
        if (data.activeView === 'global') renderGlobal(container);
        else if (data.activeView === 'pomodoro') renderPomodoro(container);
        else if (data.activeView === 'subject') renderSubject(container);
    }

    // --- VISTA GLOBALE ---
    function renderGlobal(container) {
        container.innerHTML = `<div class="card"><div class="agenda-header"><div class="nav-arrow" onclick="changeWeek(-1)">❮</div><div class="week-label" id="weekDisplay">Settimana</div><div class="nav-arrow" onclick="changeWeek(1)">❯</div></div><div id="agendaWeekly"></div></div>`;
        renderAgenda(true);
    }
    function changeWeek(dir) { weekOffset += dir; renderAgenda(data.activeView === 'global'); }

    function renderAgenda(isGlobal) {
        const target = document.getElementById(isGlobal ? 'agendaWeekly' : 'subAgendaWeekly');
        if (!target) return;
        const now = new Date();
        const start = new Date(now);
        start.setDate(now.getDate() - ( (now.getDay() === 0 ? 7 : now.getDay()) - 1) + (weekOffset * 7));
        
        document.getElementById(isGlobal ? 'weekDisplay' : 'subWeekDisplay').innerText = `Settimana ${start.getDate()}/${start.getMonth()+1}`;
        target.innerHTML = "";
        const days = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];

        for (let i = 0; i < 7; i++) {
            const d = new Date(start); d.setDate(start.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            let dayHtml = "";
            const subs = isGlobal ? Object.keys(data.subjects) : [data.activeSub];
            
            subs.forEach(s => {
                data.subjects[s].topics.forEach(t => {
                    if(t.next === dStr) dayHtml += `<div class="topic-card" style="border-left-color:${data.subjects[s].color}; color:${data.subjects[s].color}"><span class="topic-name">${t.name}</span><span class="subject-name">${s}</span></div>`;
                });
            });

            target.innerHTML += `<div class="day-section"><div class="day-title" style="${dStr === now.toISOString().split('T')[0] ? 'color:white; border-bottom-color:var(--primary);' : ''}">${d.getDate()} ${d.toLocaleDateString('it-IT',{month:'short'})} <span class="day-name">${days[i]}</span></div>${dayHtml || '<p style="opacity:0.2; font-size:0.8rem; margin-left:10px;">Libero</p>'}</div>`;
        }
    }

    // --- VISTA POMODORO ---
    function renderPomodoro(container) {
        container.innerHTML = `
            <div class="card pomodoro-box">
                <div class="status-msg" id="pomoStatus">${data.pomo.mode === 'study' ? '🔥 STUDIO' : '☕ PAUSA'}</div>
                <div class="timer-circle" id="pomoTime">00:00</div>
                
                <div class="pomo-inputs">
                    <div class="pomo-group"><label>Studio (m)</label><input type="number" id="inStudy" value="${data.pomo.study}" onchange="updatePomoSettings()"></div>
                    <div class="pomo-group"><label>Pausa (m)</label><input type="number" id="inBreak" value="${data.pomo.break}" onchange="updatePomoSettings()"></div>
                </div>

                <div class="timer-btn-row">
                    <button class="t-btn" id="pomoToggle" onclick="togglePomo()">${data.pomo.isRunning ? 'PAUSE' : 'START'}</button>
                    <button class="t-btn" onclick="resetPomo()">RESET</button>
                    <button class="t-btn" onclick="switchPomoMode()">${data.pomo.mode === 'study' ? 'A PAUSA' : 'A STUDIO'}</button>
                </div>
            </div>`;
        updatePomoDisplay();
        if(data.pomo.isRunning && !timerTick) startTick();
    }

    function updatePomoSettings() {
        data.pomo.study = parseInt(document.getElementById('inStudy').value) || 25;
        data.pomo.break = parseInt(document.getElementById('inBreak').value) || 5;
        save();
    }

    function updatePomoDisplay() {
        const m = Math.floor(data.pomo.timeLeft / 60);
        const s = data.pomo.timeLeft % 60;
        const timeStr = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if(document.getElementById('pomoTime')) document.getElementById('pomoTime').innerText = timeStr;
        document.title = data.pomo.isRunning ? `(${timeStr}) Study Hub` : "Study Hub Pro";
    }

    function togglePomo() {
        data.pomo.isRunning = !data.pomo.isRunning;
        if(data.pomo.isRunning) startTick();
        else stopTick();
        save(); render();
    }

    function startTick() {
        if(timerTick) clearInterval(timerTick);
        timerTick = setInterval(() => {
            data.pomo.timeLeft--;
            if(data.pomo.timeLeft <= 0) {
                stopTick();
                data.pomo.isRunning = false;
                showToast("TEMPO SCADUTO! Cambia sessione.");
                alert("Sessione completata!"); // Unico avviso visivo bloccante
            }
            updatePomoDisplay();
            save();
        }, 1000);
    }

    function stopTick() { clearInterval(timerTick); timerTick = null; }

    function resetPomo() {
        stopTick();
        data.pomo.isRunning = false;
        data.pomo.timeLeft = (data.pomo.mode === 'study' ? data.pomo.study : data.pomo.break) * 60;
        save(); render();
    }

    function switchPomoMode() {
        data.pomo.mode = data.pomo.mode === 'study' ? 'break' : 'study';
        resetPomo();
    }

    // --- VISTA MATERIA ---
    function renderSubject(container) {
        container.innerHTML = document.getElementById('subjectTemplate').innerHTML;
        switchSubTab(null, 'study');
    }

    function switchSubTab(el, type) {
        const sub = data.subjects[data.activeSub];
        const target = document.getElementById('tabContent');
        if (type === 'study') {
            target.innerHTML = `<div class="card"><h2>STUDIO</h2><input id="tI" placeholder="Argomento"><input id="lI" placeholder="Link Drive"><textarea id="nI" placeholder="Note..."></textarea><button class="btn" onclick="addTopic()">REGISTRA</button></div>`;
        } else if (type === 'ripasso') {
            const today = new Date().toISOString().split('T')[0];
            const due = sub.topics.filter(t => t.next <= today);
            target.innerHTML = due.length ? "" : "<h2>Tutto ok! ✅</h2>";
            due.forEach(t => target.innerHTML += `<div class="card" style="border-left:8px solid ${sub.color}"><h3>${t.name}</h3><div class="timer-btn-row"><button class="t-btn" onclick="rateTopic('${t.id}', 1)">DIFF.</button><button class="t-btn" onclick="rateTopic('${t.id}', 2)">BUONO</button><button class="t-btn" onclick="rateTopic('${t.id}', 3)">FACILE</button></div></div>`);
        } else if (type === 'calendar') {
            target.innerHTML = `<div class="card"><div class="agenda-header"><div class="nav-arrow" onclick="changeWeek(-1)">❮</div><div class="week-label" id="subWeekDisplay">Settimana</div><div class="nav-arrow" onclick="changeWeek(1)">❯</div></div><div id="subAgendaWeekly"></div></div>`;
            renderAgenda(false);
        } else if (type === 'history') {
            target.innerHTML = sub.topics.map(t => `<div class="card"><b>${t.name}</b><br><small>Prossimo: ${t.next}</small><br><span style="color:red; cursor:pointer" onclick="deleteTopic('${t.id}')">ELIMINA</span></div>`).join('');
        }
        document.querySelectorAll('.inner-nav-item').forEach(i => i.classList.toggle('active', i.id.includes(type)));
    }

    // Utility
    function shiftDate(s, d) { let date = new Date(s); date.setDate(date.getDate() + d); return date.toISOString().split('T')[0]; }
    function addTopic() { const name = document.getElementById('tI').value; if(!name) return; data.subjects[data.activeSub].topics.push({ id: Date.now().toString(), name, next: shiftDate(new Date(), 1), interval: 1 }); save(); render(); showToast("Aggiunto!"); }
    function rateTopic(id, q) { const t = data.subjects[data.activeSub].topics.find(x => x.id === id); const today = new Date().toISOString().split('T')[0]; t.interval = q === 1 ? 1 : (q === 2 ? t.interval + 3 : t.interval + 7); t.next = shiftDate(today, t.interval); save(); render(); }
    function promptNewSubject() { const n = prompt("Materia:"); if(n) { data.subjects[n] = { topics: [], color: '#a2d2ff' }; selectSubject(n); } }
    function deleteTopic(id) { data.subjects[data.activeSub].topics = data.subjects[data.activeSub].topics.filter(x => x.id !== id); save(); render(); }
    function applyImprevisto() { const today = new Date().toISOString().split('T')[0]; data.subjects[data.activeSub].topics.forEach(t => { if(t.next <= today) t.next = shiftDate(today, 1); }); save(); render(); }
    function editSubject(old) { const c = prompt("Colore HEX (es #ff0000):", data.subjects[old].color); if(c) data.subjects[old].color = c; save(); render(); }

    render();
</script>
</body>
</html>
