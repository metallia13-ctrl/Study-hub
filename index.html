<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub Pro V7.7 - Weekly Agenda</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050a0f; 
            --card-bg: #0f1720; 
            --primary: #a2d2ff; 
            --primary-bright: #87ceeb; 
            --text: #e1f5fe; 
            --text-dim: #b0bec5;
            --danger: #ff5252;
            --success: #69f0ae;
            --border: #1c2b36;
        }
        
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); font-size: 19px; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: var(--primary); color: #050a0f; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .sidebar { background: #020406; border-bottom: 2px solid var(--border); padding: 15px; display: flex; gap: 12px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; align-items: center; }
        .subject-tab { padding: 12px 24px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 1.1rem; border: 2px solid transparent; background: #1a2a3a; color: var(--text-dim); transition: 0.3s; }
        .subject-tab.active { color: #050a0f; background: var(--primary); border-color: #fff; }
        .global-tab { background: #101d29; border: 1px dashed var(--primary); }
        
        .container { padding: 20px; max-width: 950px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 25px; }
        
        .inner-nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 2px solid var(--border); }
        .inner-nav-item { padding: 15px; cursor: pointer; font-size: 0.95rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
        .inner-nav-item.active { color: var(--primary); border-bottom: 4px solid var(--primary); }
        
        /* HEADER AGENDA SETTIMANALE */
        .agenda-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #162636; padding: 15px; border-radius: 15px; }
        .nav-arrow { cursor: pointer; font-size: 1.5rem; color: var(--primary); user-select: none; font-weight: bold; }
        .week-label { font-weight: 700; color: var(--primary); font-size: 1.2rem; text-transform: uppercase; }

        .weekly-row { border-left: 6px solid var(--primary); background: #121e2a; padding: 20px; margin-bottom: 12px; border-radius: 0 15px 15px 0; border: 1px solid var(--border); }
        .weekly-date { font-weight: 700; color: var(--primary); margin-bottom: 10px; font-size: 1.3rem; display: flex; justify-content: space-between; }
        .weekly-day-name { font-size: 0.9rem; opacity: 0.7; }
        .weekly-item { font-size: 1.1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }

        .btn { border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: 700; color: #050a0f; width: 100%; margin-top: 10px; font-size: 1.2rem; background: var(--primary); text-transform: uppercase; }
        .btn-danger { background: var(--danger); color: #fff; }
        
        .hidden { display: none !important; }
        .notes-toggle { color: var(--primary); cursor: pointer; font-weight: 700; font-size: 1.1rem; margin: 15px 0; display: inline-block; text-decoration: underline; }
        .notes-content { background: #020406; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); margin: 15px 0; }
        
        .action-link { font-weight: 700; font-size: 1rem; cursor: pointer; text-decoration: underline; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px; border: 2px solid var(--border); background: #020406; color: #fff; font-size: 1.2rem; font-family: 'Roboto'; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="sidebar" id="subjectBar">
    <div class="subject-tab global-tab" id="globalBtn" onclick="activateGlobal()">GLOBALE 🌍</div>
    <button class="add-subject-btn" onclick="promptNewSubject()">+</button>
    <select class="lang-select" onchange="changeLang(this.value)" id="langPicker">
        <option value="it">IT 🇮🇹</option>
        <option value="en">EN 🇬🇧</option>
    </select>
</div>

<div id="appContent" class="container"></div>

<div id="subjectTemplate" class="hidden">
    <button class="btn btn-danger" onclick="applyImprevisto()">⚠️ GESTISCI IMPREVISTO (+1g)</button>
    <div class="inner-nav">
        <div class="inner-nav-item active" id="tab-study-btn" onclick="switchSubTab(this, 'study')">STUDIO</div>
        <div class="inner-nav-item" id="tab-ripasso-btn" onclick="switchSubTab(this, 'ripasso')">RIPASSO</div>
        <div class="inner-nav-item" id="tab-calendar-btn" onclick="switchSubTab(this, 'calendar')">AGENDA</div>
        <div class="inner-nav-item" id="tab-history-btn" onclick="switchSubTab(this, 'history')">DATI</div>
    </div>
    <div id="tabContent"></div>
</div>

<script>
    // Offset settimanale per la navigazione: 0 è la settimana corrente
    let weekOffset = 0;
    
    let data = JSON.parse(localStorage.getItem('multiSubjectDataV6')) || { subjects: {}, activeSubject: null, lang: 'it', isGlobal: false, activeTab: 'study' };
    const defaultColors = ['#a2d2ff', '#bde0fe', '#ffafcc', '#ffc8dd', '#cdb4db'];

    function showToast(msg) {
        const x = document.getElementById("toast");
        x.innerHTML = msg; x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    function save() { localStorage.setItem('multiSubjectDataV6', JSON.stringify(data)); }

    function getIntensity(interval) {
        if (interval <= 1) return 1.0;
        if (interval <= 3) return 0.7;
        if (interval <= 7) return 0.4;
        return 0.25;
    }

    function activateGlobal() {
        data.isGlobal = true;
        data.activeSubject = null;
        weekOffset = 0;
        save();
        render();
    }

    function selectSubject(name) {
        data.isGlobal = false;
        data.activeSubject = name;
        weekOffset = 0;
        save();
        render();
    }

    function render() {
        const bar = document.getElementById('subjectBar');
        bar.querySelectorAll('.subject-tab:not(.global-tab)').forEach(e => e.remove());
        document.getElementById('globalBtn').className = `subject-tab global-tab ${data.isGlobal ? 'active' : ''}`;

        Object.keys(data.subjects).forEach(sub => {
            const btn = document.createElement('div');
            btn.className = `subject-tab ${(!data.isGlobal && data.activeSubject === sub) ? 'active' : ''}`;
            btn.innerHTML = `${sub} <span onclick="event.stopPropagation(); editSubject('${sub}')">⚙️</span>`;
            btn.onclick = () => selectSubject(sub);
            bar.insertBefore(btn, document.getElementById('langPicker'));
        });

        const content = document.getElementById('appContent');
        if (data.isGlobal) {
            renderGlobalView(content);
        } else if (data.activeSubject) {
            content.innerHTML = document.getElementById('subjectTemplate').innerHTML;
            switchSubTab(null, data.activeTab || 'study');
        } else {
            content.innerHTML = `<div class="card"><h2 style="color:var(--primary)">Study Hub Pro</h2><p>Seleziona una materia per iniziare lo studio.</p></div>`;
        }
    }

    function renderGlobalView(container) {
        container.innerHTML = `
            <div class="card">
                <h2 style="color:var(--primary); text-align:center">AGENDA GLOBALE</h2>
                <div class="agenda-header">
                    <div class="nav-arrow" onclick="changeWeek(-1)">❮</div>
                    <div class="week-label" id="weekDisplay">Settimana</div>
                    <div class="nav-arrow" onclick="changeWeek(1)">❯</div>
                </div>
                <div id="agendaWeekly"></div>
            </div>`;
        renderAgenda(true);
    }

    function changeWeek(dir) {
        weekOffset += dir;
        renderAgenda(data.isGlobal);
    }

    function renderAgenda(isGlobal) {
        const weekly = document.getElementById(isGlobal ? 'agendaWeekly' : 'subAgendaWeekly');
        const weekLabel = document.getElementById(isGlobal ? 'weekDisplay' : 'subWeekDisplay');
        if (!weekly) return;

        weekly.innerHTML = "";
        const now = new Date();
        const currentDay = now.getDay() === 0 ? 7 : now.getDay();
        
        // Calcolo inizio settimana (Lunedì) basato su weekOffset
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - (currentDay - 1) + (weekOffset * 7));
        
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);

        // Aggiorna etichetta settimana
        const options = { day: '2-digit', month: 'short' };
        weekLabel.innerText = `${startOfWeek.toLocaleDateString('it-IT', options)} - ${endOfWeek.toLocaleDateString('it-IT', options)}`;

        const dayNames = ["LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO", "DOMENICA"];

        for (let i = 0; i < 7; i++) {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            const dateStr = d.toISOString().split('T')[0];
            const formattedDate = d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            
            let dayTopics = [];
            const subjectsToScan = isGlobal ? Object.keys(data.subjects) : [data.activeSubject];

            subjectsToScan.forEach(sName => {
                data.subjects[sName].topics.forEach(t => {
                    if(t.next === dateStr) {
                        dayTopics.push({ name: t.name, sub: sName, color: data.subjects[sName].color, interval: t.interval });
                    }
                });
            });

            let itemsHtml = dayTopics.length > 0 
                ? dayTopics.map(dt => `<div class="weekly-item" style="color:${dt.color}; opacity:${getIntensity(dt.interval)}"><b>• ${dt.name}</b> ${isGlobal ? '('+dt.sub+')' : ''}</div>`).join('')
                : `<div style="font-size:0.9rem; opacity:0.4">Nessun ripasso programmato</div>`;

            weekly.innerHTML += `
                <div class="weekly-row" style="${dateStr === now.toISOString().split('T')[0] ? 'border-color:var(--primary-bright); background:#162636;' : ''}">
                    <div class="weekly-date">
                        <span>${formattedDate}</span>
                        <span class="weekly-day-name">${dayNames[i]}</span>
                    </div>
                    ${itemsHtml}
                </div>`;
        }
    }

    function switchSubTab(el, type) {
        data.activeTab = type;
        const container = document.getElementById('tabContent');
        const sub = data.subjects[data.activeSubject];
        
        if (type === 'study') {
            container.innerHTML = `
                <div class="card">
                    <h2 style="color:var(--primary)">NUOVO ARGOMENTO</h2>
                    <input type="text" id="tIn" placeholder="Nome argomento">
                    <input type="text" id="lIn" placeholder="Link Google Drive">
                    <textarea id="nIn" placeholder="Note iniziali..."></textarea>
                    <button class="btn" onclick="addTopic()">REGISTRA STUDIO</button>
                </div>`;
        } else if (type === 'ripasso') {
            const today = new Date().toISOString().split('T')[0];
            const due = sub.topics.filter(t => t.next <= today);
            container.innerHTML = due.length ? "" : `<div class="card"><h2>TUTTO RIPASSATO! 🥳</h2></div>`;
            due.forEach(t => {
                container.innerHTML += `
                    <div class="card" style="border-left:8px solid ${sub.color}">
                        <h2 style="margin:0">${t.name}</h2>
                        <div class="notes-toggle" onclick="toggleNoteView('${t.id}', 'rip')">📝 NOTE</div>
                        <div id="n-box-rip-${t.id}" class="notes-content hidden">
                            <textarea id="nt-rip-${t.id}">${t.notes || ""}</textarea>
                            <button class="btn" style="padding:10px; font-size:1rem;" onclick="updateNote('${t.id}', 'rip')">SALVA NOTA</button>
                        </div>
                        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:15px">
                            <button class="btn" style="background:#333; color:#fff" onclick="rateTopic('${t.id}', 0)">RIFAI</button>
                            <button class="btn btn-danger" onclick="rateTopic('${t.id}', 1)">DIFF.</button>
                            <button class="btn" style="background:#007bff; color:#fff" onclick="rateTopic('${t.id}', 2)">BUONO</button>
                            <button class="btn" style="background:var(--success); color:#000" onclick="rateTopic('${t.id}', 3)">FACILE</button>
                        </div>
                    </div>`;
            });
        } else if (type === 'calendar') {
            container.innerHTML = `
                <div class="card">
                    <div class="agenda-header">
                        <div class="nav-arrow" onclick="changeWeek(-1)">❮</div>
                        <div class="week-label" id="subWeekDisplay">Settimana</div>
                        <div class="nav-arrow" onclick="changeWeek(1)">❯</div>
                    </div>
                    <div id="subAgendaWeekly"></div>
                </div>`;
            renderAgenda(false);
        } else if (type === 'history') {
            container.innerHTML = sub.topics.map(t => `
                <div class="card">
                    <h3 style="margin:0">${t.name}</h3>
                    <p style="color:var(--text-dim)">Ripasso: <b>${t.next.split('-').reverse().join('/')}</b></p>
                    <div class="notes-toggle" onclick="toggleNoteView('${t.id}', 'hist')">📝 NOTE</div>
                    <div id="n-box-hist-${t.id}" class="notes-content hidden">
                        <textarea id="nt-hist-${t.id}">${t.notes || ""}</textarea>
                        <button class="btn" style="padding:10px; font-size:1rem;" onclick="updateNote('${t.id}', 'hist')">SALVA NOTA</button>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:15px">
                        <span class="action-link" style="color:var(--primary)" onclick="manualDateEdit('${t.id}')">SPOSTA DATA</span>
                        <span class="action-link" style="color:var(--danger); font-weight:bold;" onclick="deleteTopic('${t.id}')">ELIMINA</span>
                    </div>
                </div>`).join('') || "<div class='card'>Nessun dato presente</div>";
            container.innerHTML += `<div class="card"><button class="btn" style="background:#222; color:#fff" onclick="exportData()">SCARICA BACKUP JSON</button></div>`;
        }

        document.querySelectorAll('.inner-nav-item').forEach(i => i.classList.remove('active'));
        const activeBtn = document.getElementById(`tab-${type}-btn`);
        if(activeBtn) activeBtn.classList.add('active');
    }

    // Le funzioni di logica (rateTopic, addTopic, updateNote, etc.) rimangono invariate per continuità dei dati
    function toggleNoteView(id, section) {
        const box = document.getElementById(`n-box-${section}-${id}`);
        box.classList.toggle('hidden');
    }

    function updateNote(id, section) {
        const t = data.subjects[data.activeSubject].topics.find(x => x.id === id);
        t.notes = document.getElementById(`nt-${section}-${id}`).value;
        save();
        showToast("Nota salvata!");
        document.getElementById(`n-box-${section}-${id}`).classList.add('hidden');
    }

    function addTopic() {
        const name = document.getElementById('tIn').value;
        if (!name) return;
        data.subjects[data.activeSubject].topics.push({
            id: Date.now().toString(), name, link: document.getElementById('lIn').value,
            notes: document.getElementById('nIn').value, next: shiftDate(new Date().toISOString().split('T')[0], 1), interval: 1
        });
        save(); render(); showToast("Argomento aggiunto!");
    }

    function rateTopic(id, q) {
        const sub = data.subjects[data.activeSubject]; const t = sub.topics.find(x => x.id === id);
        const today = new Date().toISOString().split('T')[0];
        if (q === 0) { t.interval = 1; t.next = today; }
        else if (q === 1) { t.interval = 1; t.next = shiftDate(today, 1); }
        else if (q === 2) { t.interval = (t.interval < 3) ? 3 : t.interval + 3; t.next = shiftDate(today, t.interval); }
        else if (q === 3) { t.interval = (t.interval < 7) ? 7 : t.interval + 7; t.next = shiftDate(today, t.interval); }
        save(); render(); showToast("Progresso registrato!");
    }

    function promptNewSubject() {
        const n = prompt("Nome Materia:");
        if(n) { 
            data.subjects[n] = { topics: [], color: defaultColors[Object.keys(data.subjects).length % defaultColors.length] }; 
            selectSubject(n);
        }
    }

    function shiftDate(s, d) { let date = new Date(s); date.setDate(date.getDate() + d); return date.toISOString().split('T')[0]; }
    
    function manualDateEdit(id) {
        const t = data.subjects[data.activeSubject].topics.find(x => x.id === id);
        const n = prompt("Nuova Data (GG/MM/AAAA):", t.next.split('-').reverse().join('/'));
        if(n) { 
            const p = n.split('/'); 
            if(p.length === 3) {
                t.next = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; 
                save(); render(); 
            }
        }
    }

    function deleteTopic(id) { 
        if(confirm("Eliminare definitivamente?")) { 
            data.subjects[data.activeSubject].topics = data.subjects[data.activeSubject].topics.filter(x => x.id !== id); 
            save(); render(); 
        }
    }

    function editSubject(oldName) {
        const n = prompt("Nuovo nome (o annulla):", oldName);
        const c = prompt("Nuovo colore HEX (es: #a2d2ff):", data.subjects[oldName].color);
        if(n && n !== oldName) {
            data.subjects[n] = data.subjects[oldName];
            delete data.subjects[oldName];
            data.activeSubject = n;
        }
        if(c) data.subjects[data.activeSubject || n].color = c;
        save(); render();
    }

    function exportData() { 
        const b = new Blob([JSON.stringify(data)], {type:"application/json"}); 
        const a = document.createElement("a"); a.href = URL.createObjectURL(b); 
        a.download="study_backup.json"; a.click(); 
    }

    function applyImprevisto() { 
        const sub = data.subjects[data.activeSubject]; 
        const today = new Date().toISOString().split('T')[0];
        sub.topics.forEach(t => { if(t.next <= today) t.next = shiftDate(today, 1); });
        save(); render(); showToast("Imprevisto gestito!");
    }

    render();
</script>
</body>
</html>
