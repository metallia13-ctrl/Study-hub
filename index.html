<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub Pro V7.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <style>
        :root { 
            --bg: #070b0e; 
            --card-bg: #0e161d; 
            --primary: #4deeea; 
            --text: #e0f7fa; 
            --text-dim: #80deea;
            --danger: #ff5252;
            --success: #00e676;
            --border: #1a262f;
        }
        
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); font-size: 18px; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: var(--primary); color: #000; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .sidebar { background: #040608; border-bottom: 2px solid var(--border); padding: 15px; display: flex; gap: 12px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; align-items: center; }
        .subject-tab { padding: 10px 22px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 1rem; border: 2px solid transparent; background: #16212a; color: var(--text-dim); transition: 0.3s; }
        .subject-tab.active { color: #000; background: var(--primary); border-color: #fff; }
        .global-tab { background: #1e2a35; border: 1px dashed var(--primary); }
        
        .container { padding: 20px; max-width: 950px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.7); margin-bottom: 25px; }
        
        .inner-nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 2px solid var(--border); overflow-x: auto; }
        .inner-nav-item { padding: 15px; cursor: pointer; font-size: 0.85rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }
        .inner-nav-item.active { color: var(--primary); border-bottom: 4px solid var(--primary); }
        
        .btn { border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: 700; color: #000; width: 100%; margin-top: 10px; font-size: 1.1rem; background: var(--primary); text-transform: uppercase; }
        .btn-danger { background: var(--danger); color: #fff; }
        
        /* CALENDARIO */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border-radius: 12px; overflow: hidden; }
        .calendar-day { background: var(--card-bg); min-height: 100px; padding: 8px; position: relative; }
        .calendar-header { background: #040608; color: var(--primary); padding: 10px; font-weight: 700; font-size: 0.75rem; text-align: center; }
        .day-number { font-weight: 700; color: var(--text-dim); opacity: 0.5; }
        .today { background: #16212a; border: 1px solid var(--primary); }
        
        .topic-dot { height: 6px; border-radius: 3px; margin-top: 3px; width: 100%; }

        /* SETTIMANALE */
        .weekly-row { border-left: 5px solid var(--primary); background: #0e161d; padding: 18px; margin-bottom: 12px; border-radius: 0 15px 15px 0; border: 1px solid var(--border); border-left-width: 5px; }
        .weekly-date { font-weight: 700; color: var(--primary); margin-bottom: 10px; font-size: 1.2rem; }
        .weekly-item { font-size: 1rem; margin-bottom: 5px; font-weight: 400; display: flex; align-items: center; gap: 8px; }

        input, textarea { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 2px solid var(--border); background: #05080a; color: #fff; font-size: 1.1rem; font-family: 'Roboto'; }
        .notes-content { background: #040608; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); margin: 15px 0; }
        
        .action-link { font-weight: 700; font-size: 0.9rem; cursor: pointer; text-decoration: underline; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="sidebar" id="subjectBar">
    <div class="subject-tab global-tab" id="globalBtn" onclick="activateGlobal()">GLOBALE 🌍</div>
    <button class="add-subject-btn" onclick="promptNewSubject()">+</button>
    <select class="lang-select" onchange="changeLang(this.value)" id="langPicker">
        <option value="it">IT 🇮🇹</option>
        <option value="en">EN 🇬🇧</option>
    </select>
</div>

<div id="appContent" class="container"></div>

<div id="subjectTemplate" class="hidden">
    <button class="btn btn-danger" id="btnImprevisto" onclick="applyImprevisto()"></button>
    <div class="inner-nav">
        <div class="inner-nav-item active" onclick="switchSubTab(this, 'study')">STUDIO</div>
        <div class="inner-nav-item" onclick="switchSubTab(this, 'ripasso')">RIPASSO</div>
        <div class="inner-nav-item" onclick="switchSubTab(this, 'calendar')">CALENDARIO</div>
        <div class="inner-nav-item" onclick="switchSubTab(this, 'history')">DATI</div>
    </div>
    <div id="tabContent"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('multiSubjectDataV6')) || { subjects: {}, activeSubject: null, lang: 'it', isGlobal: false };
    const defaultColors = ['#4deeea', '#74ee15', '#ffe700', '#f000ff', '#001eff', '#00e676'];

    function showToast(msg) {
        const x = document.getElementById("toast");
        x.innerHTML = msg; x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    function save() { localStorage.setItem('multiSubjectDataV6', JSON.stringify(data)); }

    function getIntensity(interval) {
        // Ritorna opacità basata sulla difficoltà (intervallo Anki)
        if (interval <= 1) return 1.0; // Difficile/Nuovo
        if (interval <= 3) return 0.7; // Buono
        if (interval <= 7) return 0.4; // Facile
        return 0.2; // Molto facile
    }

    function activateGlobal() {
        data.isGlobal = true; data.activeSubject = null;
        save(); render();
    }

    function render() {
        const bar = document.getElementById('subjectBar');
        bar.querySelectorAll('.subject-tab:not(.global-tab)').forEach(e => e.remove());
        document.getElementById('globalBtn').className = `subject-tab global-tab ${data.isGlobal ? 'active' : ''}`;

        Object.keys(data.subjects).forEach(sub => {
            const btn = document.createElement('div');
            btn.className = `subject-tab ${(!data.isGlobal && data.activeSubject === sub) ? 'active' : ''}`;
            btn.innerHTML = `${sub} <span onclick="editSubject('${sub}')">⚙️</span>`;
            btn.onclick = (e) => { if(!e.target.innerHTML.includes('⚙️')) { data.isGlobal = false; data.activeSubject = sub; save(); render(); }};
            bar.insertBefore(btn, document.getElementById('langPicker'));
        });

        const content = document.getElementById('appContent');
        if (data.isGlobal) {
            renderGlobalView(content);
        } else if (data.activeSubject) {
            content.innerHTML = document.getElementById('subjectTemplate').innerHTML;
            switchSubTab(null, 'study');
        } else {
            content.innerHTML = `<div class="card"><h2>Benvenuta! Seleziona o aggiungi una materia.</h2></div>`;
        }
    }

    function renderGlobalView(container) {
        container.innerHTML = `
            <div class="card">
                <h2 style="color:var(--primary); text-align:center">CALENDARIO GLOBALE</h2>
                <div class="calendar-grid" id="globalGrid"></div>
                <div class="weekly-view" style="margin-top:30px">
                    <h3 style="color:var(--primary); border-bottom:2px solid var(--primary); padding-bottom:10px">PIANO SETTIMANALE TOTALE</h3>
                    <div id="globalWeekly"></div>
                </div>
            </div>`;
        renderFullCalendar('globalGrid', 'globalWeekly', true);
    }

    function renderFullCalendar(gridId, weeklyId, isGlobal) {
        const grid = document.getElementById(gridId);
        const weekly = document.getElementById(weeklyId);
        const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
        const todayStr = now.toISOString().split('T')[0];
        
        grid.innerHTML = ""; weekly.innerHTML = "";
        ["LUN", "MAR", "MER", "GIO", "VEN", "SAB", "DOM"].forEach(d => grid.innerHTML += `<div class="calendar-header">${d}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const startOffset = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < startOffset + daysInMonth; i++) {
            const dayNum = i - startOffset + 1;
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            if (dayNum > 0) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                if(dateStr === todayStr) dayDiv.classList.add('today');
                dayDiv.innerHTML = `<span class="day-number">${dayNum}</span>`;
                
                let dayTopics = [];
                const subjectsToScan = isGlobal ? Object.keys(data.subjects) : [data.activeSubject];

                subjectsToScan.forEach(sName => {
                    data.subjects[sName].topics.forEach(t => {
                        if(t.next === dateStr) {
                            dayDiv.innerHTML += `<div class="topic-dot" style="background:${data.subjects[sName].color}; opacity:${getIntensity(t.interval)}"></div>`;
                            dayTopics.push({ name: t.name, sub: sName, color: data.subjects[sName].color, interval: t.interval });
                        }
                    });
                });

                const diff = (new Date(dateStr) - new Date(todayStr)) / (1000 * 3600 * 24);
                if (diff >= 0 && diff < 7 && dayTopics.length > 0) {
                    let items = dayTopics.map(dt => `<div class="weekly-item" style="color:${dt.color}; opacity:${getIntensity(dt.interval)}"><b>• ${dt.name}</b> ${isGlobal ? '('+dt.sub+')' : ''}</div>`).join('');
                    const formattedDate = dateStr.split('-').reverse().join('/');
                    weekly.innerHTML += `<div class="weekly-row"><div class="weekly-date">${formattedDate}</div>${items}</div>`;
                }
            }
            grid.appendChild(dayDiv);
        }
    }

    function switchSubTab(el, type) {
        const container = document.getElementById('tabContent');
        const sub = data.subjects[data.activeSubject];
        const lang = 'it';
        
        if (type === 'study') {
            container.innerHTML = `
                <div class="card">
                    <h2 style="color:var(--primary)">NUOVO ARGOMENTO</h2>
                    <input type="text" id="tIn" placeholder="Nome argomento">
                    <input type="text" id="lIn" placeholder="Link Google Drive">
                    <textarea id="nIn" placeholder="Note per l'ultima ripetizione..."></textarea>
                    <button class="btn" onclick="addTopic()">REGISTRA STUDIO</button>
                </div>`;
        } else if (type === 'ripasso') {
            const today = new Date().toISOString().split('T')[0];
            const due = sub.topics.filter(t => t.next <= today);
            container.innerHTML = due.length ? "" : `<div class="card"><h2>TUTTO RIPASSATO!</h2></div>`;
            due.forEach(t => {
                container.innerHTML += `
                    <div class="card" style="border-left:8px solid ${sub.color}">
                        <h2 style="margin:0">${t.name}</h2>
                        <div class="action-link" style="color:var(--primary); margin:10px 0" onclick="this.nextElementSibling.classList.toggle('hidden')">📝 NOTE</div>
                        <div class="notes-content hidden">
                            <textarea id="nt-${t.id}">${t.notes || ""}</textarea>
                            <button class="btn" style="padding:10px" onclick="updateNote('${t.id}')">SALVA</button>
                        </div>
                        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:15px">
                            <button class="btn" style="background:#333; color:#fff" onclick="rateTopic('${t.id}', 0)">RIFAI</button>
                            <button class="btn btn-danger" onclick="rateTopic('${t.id}', 1)">DIFF.</button>
                            <button class="btn" style="background:#007bff; color:#fff" onclick="rateTopic('${t.id}', 2)">BUONO</button>
                            <button class="btn" style="background:var(--success); color:#000" onclick="rateTopic('${t.id}', 3)">FACILE</button>
                        </div>
                    </div>`;
            });
        } else if (type === 'calendar') {
            container.innerHTML = `<div class="card"><div class="calendar-grid" id="subGrid"></div><div id="subWeekly" style="margin-top:20px"></div></div>`;
            renderFullCalendar('subGrid', 'subWeekly', false);
        } else if (type === 'history') {
            container.innerHTML = sub.topics.map(t => `
                <div class="card">
                    <h3 style="margin:0">${t.name}</h3>
                    <p style="color:var(--text-dim)">Prossimo: <b>${t.next.split('-').reverse().join('/')}</b></p>
                    <div class="action-link" style="color:var(--primary)" onclick="this.nextElementSibling.classList.toggle('hidden')">📝 NOTE</div>
                    <div class="notes-content hidden">
                        <textarea id="nth-${t.id}">${t.notes || ""}</textarea>
                        <button class="btn" style="padding:10px" onclick="updateNote('${t.id}', true)">SALVA</button>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:15px">
                        <span class="action-link" style="color:var(--primary)" onclick="manualDateEdit('${t.id}')">SPOSTA DATA</span>
                        <span class="action-link" style="color:var(--danger)" onclick="deleteTopic('${t.id}')">ELIMINA</span>
                    </div>
                </div>`).join('') || "Vuoto";
            container.innerHTML += `<div class="card"><button class="btn" style="background:#222; color:#fff" onclick="exportData()">ESPORTA JSON</button></div>`;
        }

        if(el) {
            document.querySelectorAll('.inner-nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function addTopic() {
        const name = document.getElementById('tIn').value;
        if (!name) return;
        data.subjects[data.activeSubject].topics.push({
            id: Date.now().toString(), name, link: document.getElementById('lIn').value,
            notes: document.getElementById('nIn').value, next: shiftDate(new Date().toISOString().split('T')[0], 1), interval: 1
        });
        save(); render(); showToast("Argomento Registrato!");
    }

    function rateTopic(id, q) {
        const sub = data.subjects[data.activeSubject]; const t = sub.topics.find(x => x.id === id);
        const today = new Date().toISOString().split('T')[0];
        if (q === 0) { t.interval = 1; t.next = today; }
        else if (q === 1) { t.interval = 1; t.next = shiftDate(today, 1); }
        else if (q === 2) { t.interval = (t.interval < 3) ? 3 : t.interval + 3; t.next = shiftDate(today, t.interval); }
        else if (q === 3) { t.interval = (t.interval < 7) ? 7 : t.interval + 7; t.next = shiftDate(today, t.interval); }
        save(); render(); showToast("Ripasso completato!");
    }

    function updateNote(id, isHistory = false) {
        const t = data.subjects[data.activeSubject].topics.find(x => x.id === id);
        t.notes = document.getElementById(isHistory ? `nth-${id}` : `nt-${id}`).value;
        save(); showToast("Nota Salvata!");
    }

    function promptNewSubject() {
        const n = prompt("Nome Materia:");
        if(n) { data.subjects[n] = { topics: [], color: defaultColors[Object.keys(data.subjects).length % defaultColors.length] }; data.activeSubject = n; data.isGlobal = false; save(); render(); }
    }

    function shiftDate(s, d) { let date = new Date(s); date.setDate(date.getDate() + d); return date.toISOString().split('T')[0]; }
    function manualDateEdit(id) {
        const t = data.subjects[data.activeSubject].topics.find(x => x.id === id);
        const n = prompt("Nuova Data (GG/MM/AAAA):", t.next.split('-').reverse().join('/'));
        if(n) { const p = n.split('/'); t.next = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; save(); render(); }
    }
    function deleteTopic(id) { if(confirm("Elimina?")) { data.subjects[data.activeSubject].topics = data.subjects[data.activeSubject].topics.filter(x => x.id !== id); save(); render(); }}
    function exportData() { const b = new Blob([JSON.stringify(data)], {type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download="backup.json"; a.click(); }
    function applyImprevisto() { 
        const sub = data.subjects[data.activeSubject]; const today = new Date().toISOString().split('T')[0];
        sub.topics.forEach(t => { if(t.next <= today) t.next = shiftDate(today, 1); });
        save(); render(); showToast("Imprevisto gestito!");
    }

    render();
</script>
</body>
</html>
