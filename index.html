<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub Ultra V10.5</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060d14;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.09);
            --glass-hover: rgba(255,255,255,0.07);
            --primary: #7dd3fc;
            --primary-glow: rgba(125,211,252,0.18);
            --text: #e2eaf2;
            --text-dim: #6b8299;
            --danger: #f87171;
            --warning: #fbbf24;
            --success: #34d399;
            --exam-color: #c084fc;
            --exam-glow: rgba(192,132,252,0.2);
            --border: rgba(255,255,255,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; min-height: 100vh; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(125,211,252,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(192,132,252,0.05) 0%, transparent 60%),
                        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(52,211,153,0.03) 0%, transparent 55%);
            pointer-events: none; z-index: 0;
        }

        /* Toast */
        #toast { visibility: hidden; min-width: 220px; background: rgba(125,211,252,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(125,211,252,0.3); color: var(--primary); text-align: center; border-radius: 14px; padding: 14px 22px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; font-size: 0.9rem; letter-spacing: 0.5px; }
        #toast.show { visibility: visible; animation: toastin 0.4s ease, toastout 0.4s 2.6s ease forwards; }

        /* Sidebar */
        .sidebar { background: rgba(6,13,20,0.85); backdrop-filter: blur(24px); border-bottom: 1px solid var(--glass-border); padding: 12px 16px; display: flex; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; align-items: center; scrollbar-width: none; }
        .sidebar::-webkit-scrollbar { display: none; }
        .subject-tab { padding: 9px 18px; border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: 600; font-size: 0.85rem; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-dim); transition: all 0.2s ease; user-select: none; }
        .subject-tab:hover { background: var(--glass-hover); color: var(--text); }
        .subject-tab.active { color: var(--bg); background: var(--primary); border-color: transparent; font-weight: 700; }
        .subject-tab.exam-mode-active { background: var(--exam-color); border-color: transparent; color: #1a0a2e; }
        .sidebar-add-btn { border-radius: 50%; width: 32px; height: 32px; min-width: 32px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--primary); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .sidebar-add-btn:hover { background: var(--primary-glow); border-color: var(--primary); }

        /* Container */
        .container { padding: 16px; max-width: 680px; margin: auto; position: relative; z-index: 1; }

        /* Glass Card */
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; border: 1px solid var(--glass-border); margin-bottom: 14px; transition: border-color 0.2s; }
        .card:hover { border-color: rgba(255,255,255,0.13); }

        /* Inner nav */
        .inner-nav { display: flex; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px; padding: 4px; margin-bottom: 16px; gap: 2px; }
        .inner-nav-item { flex: 1; padding: 10px 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; border-radius: 10px; text-align: center; transition: all 0.2s; }
        .inner-nav-item:hover { color: var(--text); background: var(--glass-hover); }
        .inner-nav-item.active { color: var(--bg); background: var(--primary); }
        .inner-nav-item.exam-tab.active { background: var(--exam-color); }

        /* Countdown */
        .countdown-info { text-align: center; background: var(--primary-glow); border: 1px dashed rgba(125,211,252,0.3); padding: 12px; border-radius: 14px; margin-bottom: 12px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; transition: all 0.2s; }
        .countdown-info:hover { background: rgba(125,211,252,0.12); }
        .countdown-info.exam-mode { background: var(--exam-glow); border-color: rgba(192,132,252,0.4); color: var(--exam-color); animation: pulse-exam 2s ease-in-out infinite; }

        /* ── Day-view agenda (stile Google Calendar) ── */
        .gcal-wrapper { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; margin-bottom: 14px; }
        .gcal-weekstrip { display: flex; border-bottom: 1px solid var(--glass-border); }
        .gcal-day-btn { flex: 1; padding: 10px 4px; text-align: center; cursor: pointer; transition: background 0.15s; border: none; background: transparent; color: var(--text-dim); font-family: 'DM Sans', sans-serif; }
        .gcal-day-btn:hover { background: var(--glass-hover); }
        .gcal-day-btn .dow { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 4px; }
        .gcal-day-btn .dom { font-size: 1rem; font-weight: 700; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .gcal-day-btn.selected .dom { background: var(--primary); color: var(--bg); }
        .gcal-day-btn.today-marker .dom { border: 2px solid var(--primary); color: var(--primary); }
        .gcal-day-btn.selected.today-marker .dom { background: var(--primary); color: var(--bg); border: none; }
        .gcal-day-btn .dot-row { display: flex; gap: 2px; justify-content: center; margin-top: 4px; min-height: 6px; }
        .gcal-dot { width: 5px; height: 5px; border-radius: 50%; }
        .gcal-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 0; }
        .gcal-nav-label { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--primary); font-weight: 700; letter-spacing: 1px; }
        .gcal-arrow { cursor: pointer; color: var(--primary); background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; padding: 5px 12px; font-size: 1rem; transition: all 0.2s; user-select: none; }
        .gcal-arrow:hover { background: var(--primary-glow); }
        .gcal-day-events { padding: 14px 16px; min-height: 60px; }
        .gcal-date-header { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.5px; }
        .gcal-no-events { opacity: 0.2; font-size: 0.82rem; padding-left: 2px; }

        /* ── Week-list (vista settimana classica) ── */
        .day-section { margin-bottom: 22px; }
        .day-title { font-family: 'Space Mono', monospace; font-size: 0.85rem; letter-spacing: 0.5px; color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 7px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; }
        .day-title.today { color: var(--primary); border-bottom-color: rgba(125,211,252,0.3); }

        /* ── Month view ── */
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--glass-border); border-radius: 14px; overflow: hidden; }
        .month-cell { background: var(--bg); padding: 6px 4px; min-height: 60px; cursor: pointer; transition: background 0.15s; }
        .month-cell:hover { background: rgba(255,255,255,0.03); }
        .month-cell.other-month { opacity: 0.3; }
        .month-cell.today-cell { background: rgba(125,211,252,0.06); }
        .month-cell-num { font-size: 0.78rem; font-weight: 700; margin-bottom: 3px; color: var(--text-dim); font-family: 'Space Mono', monospace; }
        .month-cell.today-cell .month-cell-num { color: var(--primary); }
        .month-event-pill { font-size: 0.6rem; border-radius: 4px; padding: 1px 4px; margin-bottom: 2px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .month-dow-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
        .month-dow-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); text-align: center; padding: 6px 0; }
        .view-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
        .view-btn { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-dim); font-size: 0.75rem; font-weight: 700; cursor: pointer; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .view-btn.active { background: var(--primary); color: var(--bg); border-color: transparent; }

        /* Filter bar */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .filter-chip { padding: 6px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-dim); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; user-select: none; }
        .filter-chip.on { color: var(--bg); border-color: transparent; }
        .filter-chip.on.chip-ripasso { background: var(--primary); }
        .filter-chip.on.chip-esterni { background: var(--warning); color: #1a0f00; }

        /* Topic card */
        .topic-card { background: var(--glass); border-radius: 12px; padding: 11px 13px; margin-bottom: 7px; border: 1px solid var(--glass-border); border-left: 4px solid; transition: all 0.2s; }
        .topic-card:hover { background: var(--glass-hover); }
        .topic-name { font-weight: 600; font-size: 0.92rem; display: block; margin-bottom: 3px; }
        .subject-label { font-size: 0.75rem; opacity: 0.55; font-style: italic; }
        .external-event { border-left-color: var(--warning) !important; opacity: 0.8; }
        .external-event .topic-name { color: var(--warning) !important; }

        /* Buttons */
        .btn { border: none; padding: 14px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; font-family: 'DM Sans', sans-serif; width: 100%; margin-top: 10px; font-size: 0.88rem; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: var(--bg); }
        .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
        .btn-danger:hover { background: rgba(248,113,113,0.25); }
        .btn-danger.solid { background: var(--danger); color: #fff; border: none; }
        .btn-secondary { background: var(--glass); color: var(--text-dim); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: var(--glass-hover); color: var(--text); }
        .btn-exam { background: var(--exam-glow); color: var(--exam-color); border: 1px solid rgba(192,132,252,0.3); }
        .btn-exam:hover { background: rgba(192,132,252,0.2); }
        .btn-small { padding: 8px 16px; font-size: 0.75rem; width: auto; display: inline-block; margin: 0; }
        .imprevisto-btn { width: 100%; padding: 13px; border: none; border-radius: 12px; background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); font-weight: 700; font-size: 0.82rem; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .imprevisto-btn:hover { background: rgba(248,113,113,0.18); }

        /* Db actions bottom */
        .db-actions { border-top: 1px solid var(--glass-border); padding-top: 16px; margin-top: 10px; display: flex; gap: 10px; }
        .db-actions .btn { flex: 1; margin-top: 0; font-size: 0.78rem; padding: 12px; }

        .hidden { display: none !important; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 13px 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: var(--text); font-size: 0.92rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus, textarea:focus { border-color: rgba(125,211,252,0.4); }
        textarea { resize: vertical; min-height: 75px; }
        input[type="file"] { display: none; }

        /* Triage */
        .triage-box { display: flex; gap: 8px; margin-bottom: 14px; }
        .t-dot { flex: 1; padding: 10px 4px; border-radius: 10px; font-size: 0.68rem; font-weight: 700; text-align: center; cursor: pointer; transition: all 0.2s; opacity: 0.3; border: 1px solid transparent; letter-spacing: 0.5px; }
        .t-dot:hover { opacity: 0.6; }
        .t-dot.active { opacity: 1; border-color: rgba(255,255,255,0.4); }

        /* Notes */
        .notes-toggle { color: var(--primary); cursor: pointer; font-weight: 600; font-size: 0.8rem; margin: 10px 0 0 0; display: inline-flex; align-items: center; gap: 5px; opacity: 0.8; transition: opacity 0.2s; }
        .notes-toggle:hover { opacity: 1; }
        .notes-content { background: rgba(0,0,0,0.25); padding: 11px; border-radius: 10px; border: 1px solid var(--glass-border); margin-top: 9px; }

        /* Modali */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .modal-card { width: 90%; max-width: 420px; background: rgba(10,18,28,0.96); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 22px; padding: 26px 22px; }
        .modal-title { font-family: 'Space Mono', monospace; font-size: 0.95rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 18px; color: var(--text); }
        .modal-btns { display: flex; gap: 10px; margin-top: 4px; }
        .modal-btns .btn { flex: 1; margin-top: 0; }

        /* Statistiche */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .stat-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px; padding: 15px 12px; text-align: center; }
        .stat-number { font-family: 'Space Mono', monospace; font-size: 1.7rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }
        .progress-bar-wrap { margin-bottom: 13px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.73rem; margin-bottom: 5px; color: var(--text-dim); }
        .progress-bar-bg { background: rgba(255,255,255,0.06); border-radius: 99px; height: 7px; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }

        /* Exam banner */
        .exam-banner { background: var(--exam-glow); border: 1px solid rgba(192,132,252,0.3); border-radius: 13px; padding: 11px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; }
        .exam-banner-text { color: var(--exam-color); font-weight: 700; letter-spacing: 0.3px; }
        .exam-toggle-btn { background: var(--exam-color); color: #1a0a2e; border: none; border-radius: 8px; padding: 5px 12px; font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; font-family: 'DM Sans', sans-serif; }
        .exam-toggle-btn:hover { opacity: 0.85; }

        /* Cold spots */
        .cold-card { background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.2); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
        .cold-title { color: var(--danger); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .cold-item { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(248,113,113,0.1); font-size: 0.86rem; }
        .cold-item:last-child { border-bottom: none; }

        .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 12px; }
        .ripasso-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px; margin-bottom: 11px; border-left: 4px solid; }
        .rate-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-top: 13px; }
        .rate-btn { border: none; border-radius: 10px; padding: 10px 4px; font-size: 0.7rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .rate-btn:hover { transform: translateY(-2px); }

        /* CSV import modal */
        .csv-help { font-size: 0.75rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 14px; background: rgba(0,0,0,0.25); padding: 11px; border-radius: 10px; border: 1px solid var(--glass-border); }
        .csv-help code { background: rgba(125,211,252,0.1); color: var(--primary); padding: 1px 5px; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 0.8em; }

        @keyframes toastin { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastout { from { opacity: 1; } to { opacity: 0; } }
        @keyframes pulse-exam { 0%, 100% { box-shadow: 0 0 0 0 rgba(192,132,252,0); } 50% { box-shadow: 0 0 0 6px rgba(192,132,252,0.15); } }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div class="sidebar" id="subjectBar">
        <div class="subject-tab active" id="globalBtn" onclick="setView('global')">Agenda</div>
        <button class="sidebar-add-btn" onclick="openModal('modalNewSubject')">+</button>
    </div>

    <div id="appContent" class="container"></div>

    <!-- Modali -->
    <div id="modalNewSubject" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-title">NUOVA MATERIA</div>
            <input type="text" id="inSubName" placeholder="Nome materia...">
            <div class="modal-btns">
                <button class="btn btn-primary" onclick="addNewSubject()">AGGIUNGI</button>
                <button class="btn btn-secondary" onclick="closeModal('modalNewSubject')">ANNULLA</button>
            </div>
        </div>
    </div>
    <div id="modalExamDate" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-title">DATA ESAME</div>
            <input type="text" id="inExamDate" placeholder="GG/MM/AAAA">
            <div class="modal-btns">
                <button class="btn btn-primary" onclick="confirmExamDate()">SALVA</button>
                <button class="btn btn-secondary" onclick="closeModal('modalExamDate')">ANNULLA</button>
            </div>
        </div>
    </div>
    <div id="
