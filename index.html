<style>
    /* Nuovi stili per Triage e Countdown */
    .triage-selector { display: flex; gap: 10px; margin-bottom: 15px; }
    .triage-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--border); cursor: pointer; font-size: 0.8rem; font-weight: bold; text-align: center; color: var(--bg); }
    .triage-1 { background: #00e676; } /* Base */
    .triage-2 { background: #ffe700; } /* Esame */
    .triage-3 { background: #ff5252; } /* Scoglio */
    .triage-btn.selected { border-color: white; transform: scale(1.05); }
    
    .countdown-box { position: absolute; right: 20px; top: 15px; background: #1a2a3a; padding: 5px 15px; border-radius: 10px; border: 1px solid var(--primary); font-size: 0.8rem; }
    .cold-spot-card { border-left: 4px solid var(--danger) !important; background: rgba(255, 82, 82, 0.1) !important; margin-bottom: 10px; }
</style>

<div id="examModal" class="modal-overlay hidden">
    <div class="card" style="width: 90%; max-width: 400px;">
        <h2 style="color:var(--primary)">DATA ESAME</h2>
        <input type="text" id="examDateInput" placeholder="Data Esame (GG/MM/AAAA)">
        <button class="btn" onclick="saveExamDate()">SALVA</button>
        <button class="btn" style="background:#333; color:white; margin-top:10px;" onclick="closeModal('examModal')">ANNULLA</button>
    </div>
</div>

<script>
    // Integrazione nuovi dati (Triage e Exam)
    let data = JSON.parse(localStorage.getItem('multiSubjectDataV6')) || { 
        subjects: {}, activeView: 'global', activeSub: null, externalEvents: [], activeTab: 'calendar',
        examDate: null, triageSelection: 1 
    };

    // --- FUNZIONI COUNTDOWN ---
    function saveExamDate() {
        const val = document.getElementById('examDateInput').value;
        const p = val.split('/');
        data.examDate = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
        closeModal('examModal');
        save(); render();
    }

    function getCountdown() {
        if (!data.examDate) return "";
        const diff = new Date(data.examDate) - new Date();
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
        return days > 0 ? `⏳ -${days}gg Esame` : "🎓 Giorno Esame!";
    }

    // --- FUNZIONE COLD SPOTS ---
    function getColdSpots() {
        let spots = [];
        Object.keys(data.subjects).forEach(subName => {
            data.subjects[subName].topics.forEach(t => {
                // Un "Cold Spot" è un argomento con intervallo rimasto a 1 dopo almeno 2 ripassi
                if (t.interval === 1 && t.history && t.history.length >= 2) {
                    spots.push({ name: t.name, sub: subName });
                }
            });
        });
        return spots;
    }

    // Modifica alla funzione renderGlobal per includere i nuovi elementi
    function renderGlobal(app) {
        const spots = getColdSpots();
        let spotsHtml = spots.length > 0 ? `
            <div class="card" style="border: 1px solid var(--danger)">
                <h3 style="color:var(--danger); margin:0 0 15px 0">❄️ COLD SPOTS (Argomenti Critici)</h3>
                ${spots.map(s => `<div class="topic-card cold-spot-card"><b>${s.name}</b> <small>(${s.sub})</small></div>`).join('')}
                <small style="opacity:0.6">Questi argomenti sono stati segnati come 'Difficili' più volte.</small>
            </div>` : "";

        app.innerHTML = `
            <div class="countdown-box">${getCountdown()}</div>
            <div class="card">
                <div class="agenda-header">
                    <div class="nav-arrow" onclick="changeWeek(-1)">❮</div>
                    <div class="week-label" id="weekDisplay">...</div>
                    <div class="nav-arrow" onclick="changeWeek(1)">❯</div>
                </div>
                <div id="agendaWeekly"></div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:#1a2a3a; font-size:0.8rem; flex:1" onclick="openModal('extModal')">+ IMPEGNO</button>
                    <button class="btn" style="background:#1a2a3a; font-size:0.8rem; flex:1" onclick="openModal('examModal')">🎯 DATA ESAME</button>
                </div>
            </div>
            ${spotsHtml}
        `;
        renderAgendaDisplay(true);
    }

    // Modifica alla funzione rateTopic per tracciare la storia (necessaria per i Cold Spots)
    function rateTopic(id, q) {
        const t = data.subjects[data.activeSub].topics.find(x => x.id === id);
        if (!t.history) t.history = [];
        t.history.push({ date: new Date().toISOString(), quality: q });
        
        const gaps = [0, 1, 3, 7];
        t.interval = q === 1 ? 1 : t.interval + gaps[q];
        t.next = shiftDate(new Date(), t.interval);
        save(); render();
    }

    // Modifica alla funzione setSubTab per il Triage in fase di Studio
    function setSubTab(type) {
        data.activeTab = type;
        const sub = data.subjects[data.activeSub];
        const tab = document.getElementById('tabContent');
        document.querySelectorAll('.inner-nav-item').forEach(i => i.classList.toggle('active', i.id.includes(type)));

        if (type === 'study') {
            tab.innerHTML = `
                <div class="card">
                    <h2>STUDIO</h2>
                    <div class="triage-selector">
                        <div class="triage-btn triage-1 ${data.triageSelection==1?'selected':''}" onclick="data.triageSelection=1; setSubTab('study')">BASE</div>
                        <div class="triage-btn triage-2 ${data.triageSelection==2?'selected':''}" onclick="data.triageSelection=2; setSubTab('study')">ESAME</div>
                        <div class="triage-btn triage-3 ${data.triageSelection==3?'selected':''}" onclick="data.triageSelection=3; setSubTab('study')">SCOGLIO</div>
                    </div>
                    <input id="tI" placeholder="Argomento">
                    <textarea id="nI" placeholder="Note..."></textarea>
                    <button class="btn" onclick="addTopic()">REGISTRA</button>
                </div>`;
        } 
        // ... (restante logica ripasso, calendar, history rimane uguale)
        else if (type === 'ripasso') {
            const today = new Date().toISOString().split('T')[0];
            const due = sub.topics.filter(t => t.next <= today);
            tab.innerHTML = due.length ? "" : "<h2>Tutto ripassato! 🎉</h2>";
            due.forEach(t => {
                const triageColors = ['', '#00e676', '#ffe700', '#ff5252'];
                tab.innerHTML += `<div class="card" style="border-left:8px solid ${triageColors[t.triage || 1]}">
                    <small style="color:var(--text-dim)">${sub.name.toUpperCase()}</small>
                    <h2>${t.name}</h2>
                    <div class="notes-toggle" onclick="toggleNoteDiv('${t.id}', 'rip')">📝 NOTE</div>
                    <div id="nb-rip-${t.id}" class="notes-content hidden"><textarea id="nt-rip-${t.id}">${t.notes || ""}</textarea><button class="btn" style="padding:10px; font-size:1rem" onclick="saveNote('${t.id}', 'rip')">SALVA</button></div>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:15px">
                        <button class="btn" style="background:#333; color:white" onclick="rateTopic('${t.id}', 1)">DIFF.</button>
                        <button class="btn" style="background:#007bff; color:white" onclick="rateTopic('${t.id}', 2)">BUONO</button>
                        <button class="btn" style="background:#00e676; color:black" onclick="rateTopic('${t.id}', 3)">FACILE</button>
                    </div>
                </div>`;
            });
        }
        // ... (il resto delle funzioni segue la logica originale)
    }

    // Modifica addTopic per includere il triage selezionato
    function addTopic() {
        const name = document.getElementById('tI').value;
        if(!name) return;
        data.subjects[data.activeSub].topics.push({ 
            id: Date.now().toString(), 
            name, 
            notes: document.getElementById('nI').value, 
            next: shiftDate(new Date(), 1), 
            interval: 1,
            triage: data.triageSelection,
            history: []
        });
        save(); setSubTab('study'); showToast("Registrato!");
    }
</script>
