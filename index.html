<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub Ultra V10.6</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060d14;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.09);
            --glass-hover: rgba(255,255,255,0.07);
            --primary: #7dd3fc;
            --primary-glow: rgba(125,211,252,0.15);
            --text: #e2eaf2;
            --text-dim: #6b8299;
            --danger: #f87171;
            --warning: #fbbf24;
            --success: #34d399;
            --exam-color: #c084fc;
            --exam-glow: rgba(192,132,252,0.18);
            --border: rgba(255,255,255,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; min-height: 100vh; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(125,211,252,0.05) 0%, transparent 60%),
                        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(192,132,252,0.04) 0%, transparent 60%),
                        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(52,211,153,0.03) 0%, transparent 55%);
            pointer-events: none; z-index: 0;
        }

        /* ── Toast ── */
        #toast { visibility: hidden; min-width: 200px; background: rgba(125,211,252,0.12); backdrop-filter: blur(20px); border: 1px solid rgba(125,211,252,0.25); color: var(--primary); text-align: center; border-radius: 12px; padding: 12px 20px; position: fixed; z-index: 9999; left: 50%; bottom: 28px; transform: translateX(-50%); font-weight: 700; font-size: 0.85rem; letter-spacing: 0.3px; }
        #toast.show { visibility: visible; animation: toastin 0.35s ease, toastout 0.35s 2.7s ease forwards; }

        /* ── Sidebar ── */
        .sidebar { background: rgba(6,13,20,0.88); backdrop-filter: blur(24px); border-bottom: 1px solid var(--glass-border); padding: 10px 14px; display: flex; gap: 9px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; align-items: center; scrollbar-width: none; }
        .sidebar::-webkit-scrollbar { display: none; }
        .subject-tab { padding: 8px 16px; border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: 600; font-size: 0.82rem; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-dim); transition: all 0.2s; user-select: none; }
        .subject-tab:hover { background: var(--glass-hover); color: var(--text); }
        .subject-tab.active { color: var(--bg); background: var(--primary); border-color: transparent; font-weight: 700; }
        .subject-tab.exam-mode-active { background: var(--exam-color); border-color: transparent; color: #1a0a2e; }
        .sidebar-add-btn { border-radius: 50%; width: 30px; height: 30px; min-width: 30px; border: 1px solid var(--glass-border); background: var(--glass); color: var(--primary); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .sidebar-add-btn:hover { background: var(--primary-glow); border-color: var(--primary); }

        /* ── Container ── */
        .container { padding: 14px; max-width: 680px; margin: auto; position: relative; z-index: 1; }

        /* ── Glass Card (unico stile per tutto) ── */
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 18px; padding: 18px; border: 1px solid var(--glass-border); margin-bottom: 12px; }

        /* ── Inner nav ── */
        .inner-nav { display: flex; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 13px; padding: 3px; margin-bottom: 14px; gap: 2px; }
        .inner-nav-item { flex: 1; padding: 9px 4px; cursor: pointer; font-size: 0.68rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; border-radius: 10px; text-align: center; transition: all 0.2s; }
        .inner-nav-item:hover { color: var(--text); background: var(--glass-hover); }
        .inner-nav-item.active { color: var(--bg); background: var(--primary); }
        .inner-nav-item.exam-tab.active { background: var(--exam-color); }

        /* ── View toggle (stesso stile inner-nav) ── */
        .view-toggle { display: flex; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 13px; padding: 3px; margin-bottom: 12px; gap: 2px; }
        .view-btn { flex: 1; padding: 9px 4px; cursor: pointer; font-size: 0.68rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; border-radius: 10px; text-align: center; transition: all 0.2s; border: none; background: transparent; font-family: 'DM Sans', sans-serif; }
        .view-btn:hover { color: var(--text); background: var(--glass-hover); }
        .view-btn.active { color: var(--bg); background: var(--primary); }

        /* ── Countdown ── */
        .countdown-info { text-align: center; background: var(--primary-glow); border: 1px dashed rgba(125,211,252,0.28); padding: 12px; border-radius: 14px; margin-bottom: 12px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; transition: all 0.2s; }
        .countdown-info:hover { background: rgba(125,211,252,0.1); }
        .countdown-info.exam-mode { background: var(--exam-glow); border-color: rgba(192,132,252,0.4); color: var(--exam-color); animation: pulse-exam 2s ease-in-out infinite; }

        /* ── GCal components (tutti condivisi) ── */
        .gcal-wrapper { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; overflow: hidden; margin-bottom: 12px; }
        .gcal-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; }
        .gcal-nav-label { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: var(--primary); font-weight: 700; letter-spacing: 1px; }
        .gcal-arrow { cursor: pointer; color: var(--primary); background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; padding: 5px 11px; font-size: 0.9rem; transition: all 0.2s; user-select: none; line-height: 1.4; }
        .gcal-arrow:hover { background: var(--primary-glow); }
        .gcal-weekstrip { display: flex; border-bottom: 1px solid var(--glass-border); border-top: 1px solid var(--glass-border); }
        .gcal-day-btn { flex: 1; padding: 9px 2px; text-align: center; cursor: pointer; transition: background 0.15s; border: none; background: transparent; color: var(--text-dim); font-family: 'DM Sans', sans-serif; }
        .gcal-day-btn:hover { background: var(--glass-hover); }
        .gcal-day-btn .dow { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 4px; color: var(--text-dim); }
        .gcal-day-btn .dom { font-size: 0.95rem; font-weight: 700; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .gcal-day-btn.selected .dom { background: var(--primary); color: var(--bg); }
        .gcal-day-btn.today-marker .dom { border: 2px solid var(--primary); color: var(--primary); }
        .gcal-day-btn.selected.today-marker .dom { background: var(--primary); color: var(--bg); border: none; }
        .gcal-day-btn .dot-row { display: flex; gap: 2px; justify-content: center; margin-top: 4px; min-height: 5px; }
        .gcal-dot { width: 4px; height: 4px; border-radius: 50%; }
        .gcal-day-events { padding: 12px 14px; min-height: 56px; }
        .gcal-date-header { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.5px; }
        .gcal-no-events { opacity: 0.2; font-size: 0.8rem; }

        /* ── Topic card (unico stile) ── */
        .topic-card { background: var(--glass); border-radius: 11px; padding: 10px 12px; margin-bottom: 7px; border: 1px solid var(--glass-border); border-left: 4px solid; transition: background 0.15s; }
        .topic-card:hover { background: var(--glass-hover); }
        .topic-name { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 2px; }
        .topic-time { font-family: 'Space Mono', monospace; font-size: 0.72rem; opacity: 0.6; margin-bottom: 2px; display: block; }
        .subject-label { font-size: 0.73rem; opacity: 0.5; font-style: italic; }
        .external-event { border-left-color: var(--warning) !important; }
        .external-event .topic-name { color: var(--warning) !important; }

        /* ── Week list ── */
        .day-section { margin-bottom: 20px; }
        .day-title { font-family: 'Space Mono', monospace; font-size: 0.82rem; letter-spacing: 0.4px; color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 7px; margin-bottom: 9px; display: flex; justify-content: space-between; align-items: baseline; }
        .day-title.today { color: var(--primary); border-bottom-color: rgba(125,211,252,0.28); }

        /* ── Month view ── */
        .month-dow-header { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 3px; }
        .month-dow-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); text-align: center; padding: 5px 0; }
        .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--glass-border); border-radius: 12px; overflow: hidden; }
        .month-cell { background: var(--bg); padding: 5px 3px; min-height: 56px; cursor: pointer; transition: background 0.15s; }
        .month-cell:hover { background: rgba(255,255,255,0.025); }
        .month-cell.other-month { opacity: 0.28; }
        .month-cell.today-cell { background: rgba(125,211,252,0.05); }
        .month-cell-num { font-size: 0.72rem; font-weight: 700; margin-bottom: 3px; color: var(--text-dim); font-family: 'Space Mono', monospace; text-align: center; }
        .month-cell.today-cell .month-cell-num { color: var(--primary); }
        .month-event-pill { font-size: 0.55rem; border-radius: 3px; padding: 1px 3px; margin-bottom: 1px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #060d14; opacity: 0.9; }

        /* ── Filter bar ── */
        .filter-bar { display: flex; gap: 7px; margin-bottom: 11px; align-items: center; }
        .filter-chip { padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; border: 1px solid var(--glass-border); background: var(--glass); color: var(--text-dim); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; user-select: none; }
        .filter-chip.on { color: var(--bg); border-color: transparent; }
        .filter-chip.on.chip-ripasso { background: var(--primary); }
        .filter-chip.on.chip-esterni { background: var(--warning); color: #1a0f00; }

        /* ── Buttons ── */
        .btn { border: none; padding: 13px 18px; border-radius: 11px; cursor: pointer; font-weight: 700; font-family: 'DM Sans', sans-serif; width: 100%; margin-top: 9px; font-size: 0.85rem; letter-spacing: 0.4px; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: var(--bg); }
        .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-danger-soft { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
        .btn-danger-soft:hover { background: rgba(248,113,113,0.18); }
        .btn-danger-solid { background: var(--danger); color: #fff; border: none; }
        .btn-secondary { background: var(--glass); color: var(--text-dim); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: var(--glass-hover); color: var(--text); }
        .btn-exam { background: var(--exam-glow); color: var(--exam-color); border: 1px solid rgba(192,132,252,0.28); }
        .btn-exam:hover { background: rgba(192,132,252,0.18); }
        .btn-small { padding: 7px 14px; font-size: 0.72rem; width: auto; display: inline-block; margin: 0; }
        .btn-icon { padding: 7px 12px; font-size: 0.72rem; width: auto; margin: 0; }

        .imprevisto-btn { width: 100%; padding: 12px; border: none; border-radius: 11px; background: rgba(248,113,113,0.08); color: var(--danger); border: 1px solid rgba(248,113,113,0.22); font-weight: 700; font-size: 0.8rem; letter-spacing: 0.3px; text-transform: uppercase; cursor: pointer; margin-bottom: 11px; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .imprevisto-btn:hover { background: rgba(248,113,113,0.15); }

        /* ── Ripasso cards ── */
        .ripasso-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px; margin-bottom: 10px; border-left: 4px solid; }

        /* 4-button rate grid */
        .rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px; }
        .rate-btn { border: none; border-radius: 9px; padding: 10px 4px; font-size: 0.68rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.18s; font-family: 'DM Sans', sans-serif; letter-spacing: 0.3px; line-height: 1.3; }
        .rate-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .rate-btn .rate-sub { font-size: 0.58rem; display: block; opacity: 0.65; font-weight: 400; margin-top: 2px; text-transform: none; letter-spacing: 0; }

        /* ── Triage ── */
        .triage-box { display: flex; gap: 7px; margin-bottom: 13px; }
        .t-dot { flex: 1; padding: 9px 4px; border-radius: 9px; font-size: 0.65rem; font-weight: 700; text-align: center; cursor: pointer; transition: all 0.2s; opacity: 0.28; border: 1px solid transparent; letter-spacing: 0.4px; }
        .t-dot:hover { opacity: 0.55; }
        .t-dot.active { opacity: 1; border-color: rgba(255,255,255,0.35); }

        /* ── Notes ── */
        .notes-toggle { color: var(--primary); cursor: pointer; font-weight: 600; font-size: 0.78rem; margin: 9px 0 0 0; display: inline-flex; align-items: center; gap: 4px; opacity: 0.75; transition: opacity 0.2s; }
        .notes-toggle:hover { opacity: 1; }
        .notes-content { background: rgba(0,0,0,0.22); padding: 10px; border-radius: 9px; border: 1px solid var(--glass-border); margin-top: 8px; }

        /* ── Modali ── */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .modal-card { width: 92%; max-width: 420px; background: rgba(8,16,26,0.97); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px 20px; }
        .modal-title { font-family: 'Space Mono', monospace; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 16px; color: var(--text); }
        .modal-btns { display: flex; gap: 9px; margin-top: 4px; }
        .modal-btns .btn { flex: 1; margin-top: 0; }

        /* ── Inputs ── */
        input[type="text"], input[type="time"], textarea, select.styled-select {
            width: 100%; padding: 12px 14px; margin-bottom: 10px; border-radius: 11px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.28);
            color: var(--text); font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="time"]:focus, textarea:focus, select.styled-select:focus { border-color: rgba(125,211,252,0.38); }
        textarea { resize: vertical; min-height: 70px; }
        input[type="file"] { display: none; }

        /* ── Statistiche ── */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 13px; }
        .stat-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 13px; padding: 14px 11px; text-align: center; }
        .stat-number { font-family: 'Space Mono', monospace; font-size: 1.6rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }
        .progress-bar-wrap { margin-bottom: 12px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px; color: var(--text-dim); }
        .progress-bar-bg { background: rgba(255,255,255,0.05); border-radius: 99px; height: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }

        /* ── Exam banner ── */
        .exam-banner { background: var(--exam-glow); border: 1px solid rgba(192,132,252,0.28); border-radius: 12px; padding: 10px 13px; margin-bottom: 11px; display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem; gap: 10px; }
        .exam-banner-text { color: var(--exam-color); font-weight: 700; font-size: 0.75rem; }
        .exam-toggle-btn { background: var(--exam-color); color: #1a0a2e; border: none; border-radius: 7px; padding: 5px 11px; font-size: 0.7rem; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }

        /* ── Cold spots ── */
        .cold-card { background: rgba(248,113,113,0.04); border: 1px solid rgba(248,113,113,0.18); border-radius: 14px; padding: 13px; margin-bottom: 12px; }
        .cold-title { color: var(--danger); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; }
        .cold-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(248,113,113,0.08); font-size: 0.84rem; }
        .cold-item:last-child { border-bottom: none; }

        .section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-dim); margin-bottom: 11px; }

        /* ── DB actions ── */
        .db-actions { display: flex; gap: 8px; margin-top: 0; }
        .db-actions .btn { flex: 1; margin-top: 0; font-size: 0.72rem; padding: 11px 8px; }

        /* ── CSV help ── */
        .csv-help { font-size: 0.72rem; color: var(--text-dim); line-height: 1.65; margin-bottom: 12px; background: rgba(0,0,0,0.22); padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); }
        .csv-help code { background: rgba(125,211,252,0.1); color: var(--primary); padding: 1px 4px; border-radius: 3px; font-family: 'Space Mono', monospace; font-size: 0.85em; }

        .hidden { display: none !important; }

        /* ── Sync ── */
        .sync-btn { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; padding: 6px 11px; color: var(--text-dim); font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
        .sync-btn:hover { background: var(--glass-hover); color: var(--text); }
        .sync-btn.syncing { color: var(--primary); border-color: rgba(125,211,252,0.3); animation: spin-sync 1.2s linear infinite; }
        .sync-btn.ok { color: var(--success); border-color: rgba(52,211,153,0.3); }
        .sync-btn.err { color: var(--danger); border-color: rgba(248,113,113,0.3); }
        .sync-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
