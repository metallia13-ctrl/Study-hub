<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub Ultra V9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <style>
        :root { 
            --bg: #050a0f; 
            --card-bg: #0f1720; 
            --primary: #a2d2ff; 
            --text: #e1f5fe; 
            --text-dim: #b0bec5;
            --danger: #ff5252;
            --border: #1c2b36;
            --stamina: #69f0ae;
        }
        
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); font-size: 19px; }
        
        /* Notifiche Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: var(--primary); color: #050a0f; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 5000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        .sidebar { background: #020406; border-bottom: 2px solid var(--border); padding: 15px; display: flex; gap: 12px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; align-items: center; }
        .subject-tab { padding: 12px 24px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 1.1rem; border: 2px solid transparent; background: #1a2a3a; color: var(--text-dim); }
        .subject-tab.active { color: #050a0f; background: var(--primary); border-color: #fff; }
        .special-tab { border: 1px dashed var(--primary); }

        .container { padding: 20px; max-width: 950px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 25px; }
        
        /* Navigazione */
        .inner-nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 2px solid var(--border); overflow-x: auto; }
        .inner-nav-item { padding: 15px; cursor: pointer; font-size: 0.95rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }
        .inner-nav-item.active { color: var(--primary); border-bottom: 4px solid var(--primary); }
        
        /* Agenda */
        .agenda-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .nav-arrow { cursor: pointer; font-size: 1.8rem; color: var(--primary); font-weight: bold; }
        .day-section { margin-bottom: 30px; }
        .day-title { font-weight: 700; font-size: 1.4rem; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: baseline; }
        
        .topic-card { background: #121e2a; border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 6px solid; border: 1px solid #1c2b36; border-left-width: 6px; position: relative; }
        .external-event { border-left-color: #7f8c8d; color: #bdc3c7; background: #0a1118; font-style: italic; }

        /* Stamina Bar */
        .stamina-container { height: 10px; background: #1a2a3a; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .stamina-fill { height: 100%; background: var(--stamina); transition: width 0.5s; }

        /* UI Elements */
        .btn { border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: 700; color: #050a0f; width: 100%; margin-top: 10px; font-size: 1.2rem; background: var(--primary); text-transform: uppercase; }
        .btn-danger { background: var(--danger); color: #fff; }
        .hidden { display: none !important; }
        input, textarea { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px; border: 2px solid var(--border); background: #020406; color: #fff; font-size: 1.2rem; font-family: 'Roboto'; }

        /* Modali */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 4000; display: flex; align-items: center; justify-content: center; }
        
        /* Stats Charts */
        .chart-bar { height: 20px; background: var(--primary); margin: 5px 0; border-radius: 10px; position: relative; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="sidebar" id="subjectBar">
    <div class="subject-tab special-tab" id="globalBtn" onclick="setView('global')">GLOBALE 🌍</div>
    <div class="subject-tab special-tab" id="statsBtn" onclick="setView('stats')">ANALISI 📊</div>
    <button class="add-subject-btn" onclick="toggleModal('subjectModal', true)">+</button>
    <select class="lang-select" style="background:#1a2a3a; color:white; border:none; padding:10px; border-radius:10px; margin-left:auto;">
        <option>IT 🇮🇹</option>
    </select>
</div>

<div id="appContent" class="container"></div>

<div id="subjectModal" class="modal-overlay hidden">
    <div class="card" style="width: 90%; max-width: 400px;">
        <h2>Nuova Materia</h2>
        <input type="text" id="newSubName" placeholder="Es: Neuroanatomia">
        <button class="btn" onclick="addSubject()">Aggiungi</button>
        <button class="btn" style="background:#333; color:white; margin-top:10px;" onclick="toggleModal('subjectModal', false)">Annulla</button>
    </div>
</div>

<div id="subjectTemplate" class="hidden">
    <div class="inner-nav">
        <div class="inner-nav-item" id="nav-study" onclick="setSubTab('study')">Studio</div>
        <div class="inner-nav-item" id="nav-ripasso" onclick="setSubTab('ripasso')">Ripasso</div>
        <div class="inner-nav-item" id="nav-calendar" onclick="setSubTab('calendar')">Agenda</div>
        <div class="inner-nav-item" id="nav-history" onclick="setSubTab('history')">Dati</div>
    </div>
    <div id="tabContent"></div>
</div>

<script>
    // Recupero Dati Storici
    let data = JSON.parse(localStorage.getItem('multiSubjectDataV6')) || { 
        subjects: {}, activeView: 'global', activeSub: null, externalEvents: [], staminaTarget: 100
    };
    let weekOffset = 0;

    function save() { localStorage.setItem('multiSubjectDataV6', JSON.stringify(data)); }
    function showToast(msg) { const x = document.getElementById("toast"); x.innerHTML = msg; x.className = "show"; setTimeout(() => x.className = "", 3000); }
    function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

    // --- LOGICA VISTE ---
    function setView(view, subName = null) {
        data.activeView = view;
        data.activeSub = subName;
        weekOffset = 0;
        save();
        render();
    }

    function render() {
        const bar = document.getElementById('subjectBar');
        bar.querySelectorAll('.subject-tab:not(.special-tab)').forEach(e => e.remove());
        
        document.getElementById('globalBtn').classList.toggle('active', data.activeView === 'global');
        document.getElementById('statsBtn').classList.toggle('active', data.activeView === 'stats');

        Object.keys(data.subjects).forEach(sub => {
            const btn = document.createElement('div');
            btn.className = `subject-tab ${ (data.activeView === 'subject' && data.activeSub === sub) ? 'active' : '' }`;
            btn.innerHTML = `${sub} <span onclick="event.stopPropagation(); editSub('${sub}')">⚙️</span>`;
            btn.onclick = () => setView('subject', sub);
            bar.insertBefore(btn, bar.children[2]);
        });

        const container = document.getElementById('appContent');
        if (data.activeView === 'global') renderGlobal(container);
        else if (data.activeView === 'stats') renderStats(container);
        else renderSubject(container);
    }

    // --- AGENDA GLOBALE ---
    function renderGlobal(container) {
        container.innerHTML = `
            <div class="card">
                <div class="agenda-header">
                    <div class="nav-arrow" onclick="changeWeek(-1)">❮</div>
                    <div class="week-label" id="weekDisplay">Caricamento...</div>
                    <div class="nav-arrow" onclick="changeWeek(1)">❯</div>
                </div>
                <div id="agendaWeekly"></div>
                <button class="btn" style="background:#1a2a3a; font-size:0.8rem;" onclick="importExternal()">Sincronizza Impegni Esterni</button>
            </div>`;
        renderAgenda(true);
    }

    function changeWeek(dir) { weekOffset += dir; renderAgenda(data.activeView === 'global'); }

    function renderAgenda(isGlobal) {
        const target = document.getElementById(isGlobal ? 'agendaWeekly' : 'subAgendaWeekly');
        if (!target) return;
        const now = new Date();
        const start = new Date(now);
        start.setDate(now.getDate() - ( (now.getDay() === 0 ? 7 : now.getDay()) - 1) + (weekOffset * 7));
        
        document.getElementById(isGlobal ? 'weekDisplay' : 'subWeekDisplay').innerText = `Settimana ${start.getDate()}/${start.getMonth()+1}`;
        target.innerHTML = "";

        for (let i = 0; i < 7; i++) {
            const d = new Date(start); d.setDate(start.getDate() + i);
            const dStr = d.toISOString().split('T')[0];
            let dayHtml = "";
            let load = 0;

            const subs = isGlobal ? Object.keys(data.subjects) : [data.activeSub];
            subs.forEach(s => {
                data.subjects[s].topics.forEach(t => {
                    if(t.next === dStr) {
                        dayHtml += `<div class="topic-card" style="border-left-color:${data.subjects[s].color}; color:${data.subjects[s].color}"><span style="font-weight:bold">${t.name}</span><br><small>${s}</small></div>`;
                        load += 20;
                    }
                });
            });

            // Impegni Esterni
            data.externalEvents.filter(e => e.date === dStr).forEach(e => {
                dayHtml += `<div class="topic-card external-event">🏛️ ${e.title}</div>`;
            });

            const staminaPerc = Math.min(load, 100);
            target.innerHTML += `
                <div class="day-section">
                    <div class="day-title" style="${dStr === now.toISOString().split('T')[0] ? 'color:white; border-bottom:2px solid var(--primary)' : ''}">
                        ${d.getDate()} ${d.toLocaleDateString('it-IT',{month:'short'})}
                    </div>
                    ${dayHtml || '<p style="opacity:0.2">Nessun impegno</p>'}
                    ${load > 0 ? `<div class="stamina-container"><div class="stamina-fill" style="width:${staminaPerc}%; background:${load > 80 ? 'var(--danger)' : 'var(--stamina)'}"></div></div>` : ''}
                </div>`;
        }
    }

    // --- ANALISI STATISTICHE ---
    function renderStats(container) {
        let totalTopics = 0;
        let subjectsHtml = "";
        Object.keys(data.subjects).forEach(s => {
            const count = data.subjects[s].topics.length;
            totalTopics += count;
            subjectsHtml += `<div>${s}: ${count} argomenti <div class="chart-bar" style="width:${Math.min(count*10, 100)}%; background:${data.subjects[s].color}"></div></div>`;
        });

        container.innerHTML = `
            <div class="card">
                <h2 style="color:var(--primary)">STATISTICHE STUDIO</h2>
                <p>Argomenti Totali Memoria: <b>${totalTopics}</b></p>
                ${subjectsHtml}
                <div style="margin-top:30px; padding:15px; background:rgba(162, 210, 255, 0.1); border-radius:12px;">
                    <small>💡 Più la barra è lunga, più l'argomento è consolidato nel database.</small>
                </div>
            </div>`;
    }

    // --- LOGICA MATERIA ---
    function renderSubject(container) {
        container.innerHTML = document.getElementById('subjectTemplate').innerHTML;
        setSubTab('study');
    }

    function setSubTab(type) {
        const sub = data.subjects[data.activeSub];
        const target = document.getElementById('tabContent');
        document.querySelectorAll('.inner-nav-item').forEach(i => i.classList.toggle('active', i.id.includes(type)));

        if (type === 'study') {
            target.innerHTML = `<div class="card"><h2>NUOVO STUDIO</h2><input id="tI" placeholder="Argomento"><textarea id="nI" placeholder="Note..."></textarea><button class="btn" onclick="addTopic()">REGISTRA</button></div>`;
        } else if (type === 'ripasso') {
            const today = new Date().toISOString().split('T')[0];
            const due = sub.topics.filter(t => t.next <= today);
            target.innerHTML = due.length ? "" : "<h2>Tutto ripassato! 🎉</h2>";
            due.forEach(t => target.innerHTML += `<div class="card" style="border-left:8px solid ${sub.color}"><h3>${t.name}</h3><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;"><button class="btn" style="background:#333; color:white" onclick="rateTopic('${t.id}', 1)">DIFF.</button><button class="btn" style="background:#007bff; color:white" onclick="rateTopic('${t.id}', 2)">BUONO</button><button class="btn" style="background:var(--stamina); color:black" onclick="rateTopic('${t.id}', 3)">FACILE</button></div></div>`);
        } else if (type === 'calendar') {
            target.innerHTML = `<div class="card"><div class="agenda-header"><div class="nav-arrow" onclick="changeWeek(-1)">❮</div><div class="week-label" id="subWeekDisplay">...</div><div class="nav-arrow" onclick="changeWeek(1)">❯</div></div><div id="subAgendaWeekly"></div></div>`;
            renderAgenda(false);
        } else if (type === 'history') {
            target.innerHTML = sub.topics.map(t => `<div class="card"><b>${t.name}</b><br><small>Prossimo: ${t.next}</small> <span style="color:red; cursor:pointer; float:right;" onclick="delTopic('${t.id}')">ELIMINA</span></div>`).join('');
        }
    }

    // --- AZIONI ---
    function addSubject() {
        const n = document.getElementById('newSubName').value;
        if(!n) return;
        data.subjects[n] = { topics: [], color: '#' + Math.floor(Math.random()*16777215).toString(16) };
        toggleModal('subjectModal', false);
        save(); render();
    }

    function addTopic() {
        const name = document.getElementById('tI').value;
        if(!name) return;
        data.subjects[data.activeSub].topics.push({ id: Date.now().toString(), name, next: shiftDate(new Date(), 1), interval: 1 });
        save(); setSubTab('study'); showToast("Registrato!");
    }

    function rateTopic(id, q) {
        const t = data.subjects[data.activeSub].topics.find(x => x.id === id);
        const today = new Date().toISOString().split('T')[0];
        t.interval = q === 1 ? 1 : (q === 2 ? t.interval + 3 : t.interval + 7);
        t.next = shiftDate(today, t.interval);
        save(); setSubTab('ripasso'); showToast("Aggiornato!");
    }

    function importExternal() {
        const title = prompt("Titolo impegno (es. Tirocinio):");
        const date = prompt("Data (AAAA-MM-GG):");
        if(title && date) {
            data.externalEvents.push({ title, date });
            save(); render();
        }
    }

    function shiftDate(s, d) { let date = new Date(s); date.setDate(date.getDate() + d); return date.toISOString().split('T')[0]; }
    function delTopic(id) { data.subjects[data.activeSub].topics = data.subjects[data.activeSub].topics.filter(x => x.id !== id); save(); setSubTab('history'); }

    // Start
    render();
</script>
</body>
</html>
