<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Study Hub">
    <link rel="manifest" id="pwaManifest">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* ── STUDY HUB — Lusso Minimalista: Nero & Oro ── */
        :root {
            --bg:#0a0a0a; --bg2:#111; --bg3:#161616;
            --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.15); --gold-line:rgba(201,168,76,0.25);
            --gold-glow:rgba(201,168,76,0.06);
            --text:#ede8df; --text-dim:#5e5347; --text-mid:#9e9485;
            --danger:#c0392b; --danger-dim:rgba(192,57,43,0.1);
            --warning:#c9a84c; --success:#4a7c59; --success-bright:#6aab7e;
            --exam-color:#9b7fc8; --exam-glow:rgba(155,127,200,0.1);
            --border:rgba(201,168,76,0.14); --border-sub:rgba(255,255,255,0.03);
            --shadow:0 8px 32px rgba(0,0,0,0.6);
            /* aliases JS */
            --primary:var(--gold); --primary-glow:var(--gold-dim);
            --glass:rgba(255,255,255,0.02); --glass-border:var(--border); --glass-hover:rgba(201,168,76,0.04);
            --card-shadow:var(--shadow);
        }
        body.light {
            --bg:#f5f0e8; --bg2:#ede8df; --bg3:#e5dfd4;
            --gold:#8b6914; --gold-dim:rgba(139,105,20,0.14); --gold-line:rgba(139,105,20,0.28);
            --gold-glow:rgba(139,105,20,0.05);
            --text:#1a1612; --text-dim:#8a7d6a; --text-mid:#6b5f4e;
            --danger:#9b1c1c; --danger-dim:rgba(155,28,28,0.08);
            --success:#2d5a3d; --success-bright:#3d7a52;
            --exam-color:#6b4fa0; --exam-glow:rgba(107,79,160,0.08);
            --border:rgba(139,105,20,0.2); --border-sub:rgba(0,0,0,0.03);
            --shadow:0 4px 16px rgba(0,0,0,0.08);
            --primary:var(--gold); --primary-glow:var(--gold-dim);
            --glass:rgba(255,255,255,0.55); --glass-border:var(--border); --glass-hover:rgba(139,105,20,0.05);
            --card-shadow:var(--shadow);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Josefin Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s;-webkit-font-smoothing:antialiased;}
        /* grain */
        body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9990;opacity:.35;}
        /* top gold line */
        body::before{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);z-index:9991;opacity:.45;}
        /* Toast */
        #toast{visibility:hidden;background:var(--bg3);border:1px solid var(--gold-line);color:var(--gold);text-align:center;padding:10px 24px;position:fixed;z-index:99999;left:50%;bottom:32px;transform:translateX(-50%);font-family:'Josefin Sans',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;white-space:nowrap;box-shadow:var(--shadow);}
        #toast.show{visibility:visible;animation:toastin .3s ease,toastout .3s 2.7s ease forwards;}
        /* Sidebar */
        .sidebar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;gap:0;overflow-x:auto;position:sticky;top:0;z-index:1000;align-items:center;scrollbar-width:none;}
        body.light .sidebar{background:var(--bg);}
        .sidebar::-webkit-scrollbar{display:none;}
        .subject-tab{padding:6px 14px;cursor:pointer;white-space:nowrap;font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .2s;user-select:none;height:100%;display:flex;align-items:center;}
        .subject-tab:hover{color:var(--text-mid);border-bottom-color:var(--border);}
        .subject-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
        .subject-tab.exam-mode-active{color:var(--exam-color);border-bottom-color:var(--exam-color);}
        .sidebar-add-btn{width:26px;height:26px;min-width:26px;border:1px solid var(--border);background:transparent;color:var(--gold);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:4px;}
        .sidebar-add-btn:hover{background:var(--gold-glow);}
        .theme-btn{padding:5px 10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:.68rem;cursor:pointer;transition:all .2s;font-family:'Josefin Sans',sans-serif;letter-spacing:.5px;}
        .theme-btn:hover{color:var(--gold);border-color:var(--gold-line);}
        /* Container */
        .container{padding:20px 16px;max-width:680px;margin:auto;position:relative;z-index:1;}
        /* Card */
        .card{background:var(--bg2);border:1px solid var(--border);border-top:1px solid var(--gold-line);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
        /* Inner nav */
        .inner-nav{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0;overflow-x:auto;scrollbar-width:none;}
        .inner-nav::-webkit-scrollbar{display:none;}
        .inner-nav-item{flex-shrink:0;padding:10px 11px;cursor:pointer;font-size:.62rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
        .inner-nav-item:hover{color:var(--text-mid);}
        .inner-nav-item.active{color:var(--gold);border-bottom-color:var(--gold);}
        .inner-nav-item.exam-tab.active{color:var(--exam-color);border-bottom-color:var(--exam-color);}
        /* View toggle */
        .view-toggle{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;gap:0;overflow-x:auto;scrollbar-width:none;}
        .view-toggle::-webkit-scrollbar{display:none;}
        .view-btn{flex-shrink:0;padding:8px 14px;cursor:pointer;font-size:.62rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;border:none;background:transparent;font-family:'Josefin Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
        .view-btn:hover{color:var(--text-mid);}
        .view-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
        /* Countdown */
        .countdown-info{text-align:center;border:1px solid var(--gold-line);border-top:2px solid var(--gold);padding:18px;margin-bottom:14px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:var(--gold);letter-spacing:8px;transition:all .2s;background:var(--gold-glow);}
        .countdown-info:hover{background:rgba(201,168,76,0.08);}
        .countdown-info.exam-mode{border-color:var(--exam-color);color:var(--exam-color);background:var(--exam-glow);animation:pulse-exam 2s ease-in-out infinite;}
        /* GCal */
        .gcal-wrapper{background:var(--bg2);border:1px solid var(--border);border-top:1px solid var(--gold-line);margin-bottom:14px;box-shadow:var(--shadow);}
        .gcal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border-sub);}
        .gcal-nav-label{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:400;color:var(--gold);letter-spacing:3px;text-transform:uppercase;}
        .gcal-arrow{cursor:pointer;color:var(--text-dim);background:transparent;border:1px solid var(--border);padding:5px 12px;font-size:.8rem;transition:all .2s;user-select:none;line-height:1.4;}
        .gcal-arrow:hover{color:var(--gold);border-color:var(--gold-line);}
        .gcal-weekstrip{display:flex;border-bottom:1px solid var(--border);}
        .gcal-day-btn{flex:1;padding:10px 2px;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--text-dim);font-family:'Josefin Sans',sans-serif;transition:background .15s;}
        .gcal-day-btn:hover{background:var(--gold-glow);}
        .gcal-day-btn .dow{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;}
        .gcal-day-btn .dom{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;width:30px;height:30px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
        .gcal-day-btn.selected .dom{background:var(--gold);color:var(--bg);}
        .gcal-day-btn.today-marker .dom{border:1px solid var(--gold);color:var(--gold);}
        .gcal-day-btn.selected.today-marker .dom{background:var(--gold);color:var(--bg);border:none;}
        .gcal-day-btn .dot-row{display:flex;gap:2px;justify-content:center;margin-top:5px;min-height:4px;}
        .gcal-dot{width:3px;height:3px;border-radius:50%;}
        .gcal-day-events{padding:14px 16px;min-height:60px;}
        .gcal-date-header{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--text-dim);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;}
        .gcal-no-events{opacity:.22;font-size:.75rem;letter-spacing:.5px;}
        /* Topic card */
        .topic-card{background:transparent;padding:10px 12px;margin-bottom:5px;border:none;border-left:2px solid;border-bottom:1px solid var(--border-sub);transition:background .15s;}
        .topic-card:hover{background:var(--gold-glow);}
        .topic-card:last-child{border-bottom:none;}
        .topic-name{font-weight:700;font-size:.75rem;display:block;margin-bottom:2px;letter-spacing:.8px;text-transform:uppercase;}
        .topic-time{font-family:'Cormorant Garamond',serif;font-size:.85rem;opacity:.55;margin-bottom:2px;display:block;}
        .subject-label{font-size:.65rem;opacity:.35;letter-spacing:.5px;text-transform:uppercase;}
        .external-event{border-left-color:var(--gold)!important;}
        .external-event .topic-name{color:var(--gold)!important;}
        /* Week/month */
        .day-section{margin-bottom:22px;}
        .day-title{font-family:'Cormorant Garamond',serif;font-size:.9rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline;}
        .day-title.today{color:var(--gold);border-bottom-color:var(--gold-line);}
        .month-dow-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
        .month-dow-label{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);text-align:center;padding:5px 0;}
        .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
        .month-cell{background:var(--bg);padding:5px 3px;min-height:58px;cursor:pointer;transition:background .15s;}
        .month-cell:hover{background:var(--bg3);}
        .month-cell.other-month{opacity:.22;}
        .month-cell.today-cell{background:var(--gold-glow);}
        .month-cell-num{font-family:'Cormorant Garamond',serif;font-size:.85rem;margin-bottom:3px;color:var(--text-dim);text-align:center;}
        .month-cell.today-cell .month-cell-num{color:var(--gold);}
        .month-event-pill{font-size:.52rem;padding:1px 3px;margin-bottom:1px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#0a0a0a;opacity:.88;letter-spacing:.3px;}
        /* Filter */
        .filter-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
        .filter-chip{padding:5px 12px;font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;user-select:none;}
        .filter-chip.on{border-color:var(--gold-line);}
        .filter-chip.on.chip-ripasso,.filter-chip.on.chip-esterni{background:var(--gold-glow);color:var(--gold);}
        /* Buttons */
        .btn{border:1px solid var(--border);padding:13px 18px;cursor:pointer;font-family:'Josefin Sans',sans-serif;font-weight:700;width:100%;margin-top:9px;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;transition:all .2s;background:transparent;color:var(--text-dim);}
        .btn:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
        .btn-primary{background:var(--gold);color:var(--bg);border-color:var(--gold);}
        .btn-primary:hover{opacity:.88;}
        .btn-danger-solid{background:var(--danger);color:#fff;border-color:var(--danger);}
        .btn-secondary{background:transparent;color:var(--text-dim);border-color:var(--border);}
        .btn-secondary:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
        .btn-exam{background:var(--exam-glow);color:var(--exam-color);border-color:rgba(155,127,200,.28);}
        .btn-exam:hover{filter:brightness(1.1);}
        .btn-small{padding:6px 14px;font-size:.62rem;width:auto;display:inline-block;margin:0;}
        .btn-icon{padding:6px 12px;font-size:.62rem;width:auto;margin:0;}
        .imprevisto-btn{width:100%;padding:12px;border:1px solid rgba(192,57,43,.25);background:var(--danger-dim);color:var(--danger);font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:12px;transition:all .2s;}
        .imprevisto-btn:hover{background:rgba(192,57,43,.16);}
        /* Ripasso */
        .ripasso-card{background:var(--bg2);border:1px solid var(--border);border-top:1px solid var(--gold-line);padding:16px;margin-bottom:10px;border-left:3px solid;box-shadow:var(--shadow);}
        .rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
        .rate-btn{border:1px solid var(--border);padding:10px 4px;font-size:.6rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .18s;font-family:'Josefin Sans',sans-serif;background:transparent;color:var(--text-dim);line-height:1.3;}
        .rate-btn:hover{border-color:var(--gold-line);color:var(--text);background:var(--gold-glow);}
        .rate-btn .rate-sub{font-size:.52rem;display:block;opacity:.45;font-weight:400;margin-top:2px;text-transform:none;letter-spacing:0;}
        /* Triage */
        .triage-box{display:flex;gap:6px;margin-bottom:14px;}
        .t-dot{flex:1;padding:9px 4px;font-size:.58rem;font-weight:700;text-align:center;cursor:pointer;transition:all .2s;opacity:.2;border:1px solid transparent;letter-spacing:1px;text-transform:uppercase;}
        .t-dot:hover{opacity:.5;}
        .t-dot.active{opacity:1;border-color:rgba(255,255,255,.18);}
        body.light .t-dot.active{border-color:rgba(0,0,0,.15);}
        /* Notes (argomento) */
        .notes-toggle{color:var(--text-dim);cursor:pointer;font-size:.65rem;margin:10px 0 0;display:inline-flex;align-items:center;gap:5px;opacity:.65;transition:opacity .2s;letter-spacing:1px;text-transform:uppercase;}
        .notes-toggle:hover{opacity:1;color:var(--gold);}
        .notes-content{background:var(--bg);padding:12px;border:1px solid var(--border);margin-top:10px;}
        /* Modali */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:5000;display:flex;align-items:center;justify-content:center;}
        .modal-card{width:92%;max-width:400px;background:var(--bg2);border:1px solid var(--gold-line);border-top:2px solid var(--gold);padding:28px 24px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.8);}
        body.light .modal-card{background:var(--bg2);}
        .modal-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;color:var(--gold);}
        .modal-btns{display:flex;gap:8px;margin-top:6px;}
        .modal-btns .btn{flex:1;margin-top:0;}
        /* Inputs */
        input[type="text"],input[type="time"],textarea,select.styled-select{width:100%;padding:12px 0;margin-bottom:10px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);font-size:.88rem;font-family:'Josefin Sans',sans-serif;outline:none;transition:border-color .2s;letter-spacing:.3px;}
        input:focus,textarea:focus,select.styled-select:focus{border-color:var(--gold);}
        textarea{resize:vertical;min-height:70px;border:1px solid var(--border);padding:10px;}
        textarea:focus{border-color:var(--gold);}
        input[type="file"]{display:none;}
        select.styled-select option{background:var(--bg2);}
        /* Stats */
        .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-bottom:14px;background:var(--border);}
        .stat-box{background:var(--bg2);padding:18px 12px;text-align:center;}
        .stat-number{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;line-height:1;margin-bottom:6px;}
        .stat-label{font-size:.56rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.8px;}
        .progress-bar-wrap{margin-bottom:14px;}
        .progress-label{display:flex;justify-content:space-between;font-size:.62rem;margin-bottom:6px;color:var(--text-dim);letter-spacing:.5px;}
        .progress-bar-bg{background:rgba(255,255,255,.04);height:1px;overflow:hidden;}
        body.light .progress-bar-bg{background:rgba(0,0,0,.08);}
        .progress-bar-fill{height:100%;transition:width .6s ease;}
        .session-bar-wrap{display:flex;align-items:flex-end;gap:3px;height:60px;margin-bottom:6px;}
        .session-bar{flex:1;background:var(--gold);opacity:.3;transition:opacity .2s;min-width:0;}
        .session-bar:hover{opacity:.7;}
        .session-labels{display:flex;gap:3px;}
        .session-label{flex:1;font-size:.48rem;text-align:center;color:var(--text-dim);font-family:'Cormorant Garamond',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        /* Pomodoro */
        .pomo-ring{position:relative;width:130px;height:130px;margin:0 auto 20px;}
        .pomo-ring svg{transform:rotate(-90deg);}
        .pomo-ring circle{fill:none;stroke-width:1;}
        .pomo-ring .track{stroke:var(--border);}
        .pomo-ring .progress{stroke:var(--gold);stroke-linecap:butt;transition:stroke-dashoffset 1s linear;}
        .pomo-ring .break-progress{stroke:var(--success-bright);}
        .pomo-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--text);text-align:center;line-height:1.2;}
        .pomo-label{font-size:.5rem;display:block;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-family:'Josefin Sans',sans-serif;margin-top:2px;}
        .pomo-controls{display:flex;gap:6px;}
        .pomo-controls .btn{flex:1;margin-top:0;padding:10px;font-size:.62rem;}
        .pomo-sessions{font-size:.62rem;color:var(--text-dim);text-align:center;margin-top:10px;letter-spacing:1.2px;text-transform:uppercase;}
        /* Today widget */
        .today-widget{background:var(--bg2);border:1px solid var(--border);border-top:1px solid var(--gold-line);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
        .today-widget-title{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--text-dim);letter-spacing:3px;margin-bottom:14px;text-transform:uppercase;}
        /* Exam banner */
        .exam-banner{background:var(--exam-glow);border:1px solid rgba(155,127,200,.18);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;font-size:.72rem;gap:10px;}
        .exam-banner-text{color:var(--exam-color);font-weight:700;letter-spacing:.5px;font-size:.65rem;text-transform:uppercase;}
        .exam-toggle-btn{background:var(--exam-color);color:#fff;border:none;padding:5px 12px;font-size:.62rem;font-weight:700;cursor:pointer;font-family:'Josefin Sans',sans-serif;letter-spacing:1px;text-transform:uppercase;}
        /* Cold spots */
        .cold-card{background:var(--bg2);border:1px solid rgba(192,57,43,.18);border-left:2px solid var(--danger);padding:14px;margin-bottom:14px;}
        .cold-title{color:var(--danger);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
        .cold-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(192,57,43,.06);font-size:.8rem;}
        .cold-item:last-child{border-bottom:none;}
        .section-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:12px;}
        .db-actions{display:flex;gap:6px;margin-top:0;}
        .db-actions .btn{flex:1;margin-top:0;font-size:.6rem;padding:11px 6px;}
        .csv-help{font-size:.68rem;color:var(--text-dim);line-height:1.7;margin-bottom:12px;padding:12px;border:1px solid var(--border);background:var(--bg);}
        .csv-help code{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:.9em;}
        .hidden{display:none!important;}
        /* Sync */
        .sync-btn{background:transparent;border:1px solid var(--border);padding:5px 10px;color:var(--text-dim);font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'Josefin Sans',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px;}
        .sync-btn:hover{color:var(--gold);border-color:var(--gold-line);}
        .sync-status-dot{width:5px;height:5px;background:var(--text-dim);flex-shrink:0;}
        .sync-status-dot.connected{background:var(--success-bright);}
        .sync-status-dot.error{background:var(--danger);}
        .sync-info-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:12px;}
        .sync-info-text{font-size:.68rem;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        /* Draggable */
        .draggable-item{cursor:grab;}
        .draggable-item.dragging{opacity:.3;}
        .drag-over{border-top:1px solid var(--gold)!important;}
        /* Note tab */
        .todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-sub);}
        .todo-item:last-child{border-bottom:none;}
        .todo-cb{width:16px;height:16px;min-width:16px;border:1px solid var(--border);background:transparent;cursor:pointer;appearance:none;-webkit-appearance:none;margin-top:3px;transition:all .2s;}
        .todo-cb:checked{background:var(--gold);border-color:var(--gold);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 6l3 3 5-5' stroke='%230a0a0a' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:center;}
        .todo-text{flex:1;font-size:.82rem;line-height:1.5;word-break:break-word;letter-spacing:.2px;}
        .todo-text.done{text-decoration:line-through;opacity:.28;}
        .todo-del{color:var(--danger);opacity:0;font-size:.75rem;cursor:pointer;padding:2px 6px;transition:opacity .2s;flex-shrink:0;}
        .todo-item:hover .todo-del{opacity:.55;}
        .todo-add-row{display:flex;gap:8px;margin-top:14px;align-items:flex-end;}
        .todo-add-row input{margin-bottom:0;flex:1;padding:8px 0;font-size:.82rem;}
        .todo-add-btn{border:1px solid var(--gold-line);background:var(--gold-glow);color:var(--gold);padding:8px 16px;font-size:.65rem;font-weight:700;cursor:pointer;letter-spacing:1.2px;text-transform:uppercase;font-family:'Josefin Sans',sans-serif;transition:all .2s;white-space:nowrap;}
        .todo-add-btn:hover{background:var(--gold);color:var(--bg);}
        .note-pad{width:100%;min-height:140px;resize:vertical;}
        .notes-section-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
        .todo-count{font-family:'Cormorant Garamond',serif;font-size:.82rem;color:var(--text-dim);letter-spacing:1px;}

        @keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes toastout{from{opacity:1}to{opacity:0}}
        @keyframes pulse-exam{0%,100%{box-shadow:0 0 0 0 rgba(155,127,200,0)}50%{box-shadow:0 0 0 6px rgba(155,127,200,.08)}}
    </style>
</head>

<input type="file" id="importFileInput" accept=".json" onchange="handleImport(event)">
<input type="file" id="importCsvFileInput" accept=".csv" onchange="handleCsvFile(event)">

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
let data = JSON.parse(localStorage.getItem('multiSubjectDataV6')) || {
    subjects:{}, isGlobal:true, activeSub:null, triage:1, activeTab:'study',
    externalEvents:[], globalView:'dayview', filterRipasso:true, filterEsterni:true,
    sessionLog:{} // {YYYY-MM-DD: count} per materia dentro subjects
};
if(!data.globalView) data.globalView='dayview';
if(data.filterRipasso===undefined) data.filterRipasso=true;
if(data.filterEsterni===undefined) data.filterEsterni=true;
if(!data.sessionLog) data.sessionLog={};

let weekOffset=0, selectedDayOffset=0, monthOffset=0;
let pomodoroTimer=null, pomodoroSeconds=25*60, pomodoroRunning=false, pomodoroSession=0, pomodoroBreak=false;
let dragSrc=null;

const colors=['#7dd3fc','#34d399','#fbbf24','#f472b6','#f87171','#a78bfa'];
const DOW_SHORT=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const DOW_FULL=['DOMENICA','LUNEDÌ','MARTEDÌ','MERCOLEDÌ','GIOVEDÌ','VENERDÌ','SABATO'];
const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function save(){localStorage.setItem('multiSubjectDataV6',JSON.stringify(data));}
function showToast(msg){const x=document.getElementById('toast');x.innerHTML=msg;x.className='show';setTimeout(()=>x.className='',3300);}
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function shiftDate(s,d){let dt=new Date(s);dt.setDate(dt.getDate()+d);return localDateStr(dt);}
function todayStr(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function localDateStr(dt){return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function fmtDate(iso){return iso.split('-').reverse().join('/');}

// ── PWA Manifest ──────────────────────────────────────────────────────────────
(function(){
    const m={name:"Study Hub",short_name:"Study Hub",description:"Pianificazione studio",start_url:"./",display:"standalone",background_color:"#0a0a0a",theme_color:"#0a0a0a",orientation:"portrait",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%230a0a0a'/%3E%3Ctext x='96' y='132' font-size='110' text-anchor='middle' fill='%23c9a84c' font-family='Georgia%2Cserif'%3ES%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"},
    {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230a0a0a'/%3E%3Ctext x='256' y='350' font-size='300' text-anchor='middle' fill='%23c9a84c' font-family='Georgia%2Cserif'%3ES%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
    const el=document.getElementById('pwaManifest');
    if(el){const b=new Blob([JSON.stringify(m)],{type:'application/json'});el.href=URL.createObjectURL(b);}
})();

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme(){
    document.body.classList.toggle('light');
    const isLight=document.body.classList.contains('light');
    localStorage.setItem('studyhub_theme',isLight?'light':'dark');
    document.getElementById('themeBtn').textContent=isLight?'◐':'○';
}
if(localStorage.getItem('studyhub_theme')==='light'){document.body.classList.add('light');}
// Set correct icon on load
document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeBtn');if(b)b.textContent=document.body.classList.contains('light')?'◐':'○';});

// ── Exam mode ────────────────────────────────────────────────────────────────
function isExamModeAuto(n){const s=data.subjects[n];if(!s||!s.examDate)return false;const t=new Date();t.setHours(0,0,0,0);const d=Math.ceil((new Date(s.examDate)-t)/(864e5));return d>0&&d<=7;}
function isExamModeFinal(n){const s=data.subjects[n];if(!s)return false;if(s.examModeOverride)return false;return s.examModeManual||isExamModeAuto(n);}
function toggleExamMode(n){
    const s=data.subjects[n];
    if(isExamModeAuto(n)&&!s.examModeManual){s.examModeManual=false;s.examModeOverride=true;}
    else if(s.examModeOverride){s.examModeOverride=false;s.examModeManual=false;}
    else{s.examModeManual=!s.examModeManual;s.examModeOverride=false;}
    save();render();
}

// ── Navigation ───────────────────────────────────────────────────────────────
function setView(view,sub=null){data.isGlobal=(view==='global');data.activeSub=sub;weekOffset=0;selectedDayOffset=0;monthOffset=0;save();render();}

function render(){
    const bar=document.getElementById('subjectBar');
    bar.querySelectorAll('.subject-tab:not(#globalBtn)').forEach(e=>e.remove());
    document.getElementById('globalBtn').classList.toggle('active',data.isGlobal);
    Object.keys(data.subjects).forEach(name=>{
        const btn=document.createElement('div');
        const isA=!data.isGlobal&&data.activeSub===name, examM=isExamModeFinal(name);
        btn.className=`subject-tab${isA?' active':''}${isA&&examM?' exam-mode-active':''}`;
        btn.textContent=name+(examM?' 🔴':'');
        btn.onclick=()=>setView('subject',name);
        btn.ondblclick=()=>openEditSubjectModal(name);
        bar.insertBefore(btn,bar.children[bar.children.length-2]); // before theme btn
    });
    const app=document.getElementById('appContent');
    if(data.isGlobal)renderGlobal(app);else renderMateria(app);
}

// ── Global ───────────────────────────────────────────────────────────────────
function renderGlobal(target){
    const v=data.globalView||'dayview';
    target.innerHTML=`
        <div class="view-toggle">
            <div class="view-btn${v==='today'?' active':''}" onclick="setGlobalView('today')">Oggi</div>
            <div class="view-btn${v==='dayview'?' active':''}" onclick="setGlobalView('dayview')">Giorno</div>
            <div class="view-btn${v==='week'?' active':''}" onclick="setGlobalView('week')">Settimana</div>
            <div class="view-btn${v==='month'?' active':''}" onclick="setGlobalView('month')">Mese</div>
        </div>
        <div class="filter-bar">
            <div class="filter-chip chip-ripasso${data.filterRipasso?' on':''}" onclick="toggleFilter('ripasso')">● Ripassi</div>
            <div class="filter-chip chip-esterni${data.filterEsterni?' on':''}" onclick="toggleFilter('esterni')">● Impegni</div>
            <div style="margin-left:auto;"><button class="btn btn-secondary btn-icon" onclick="openModal('modalExt')">+ Impegno</button></div>
        </div>
        <div id="mainCalendarArea"></div>
        <div id="coldSpotsSection"></div>
        <div class="card" style="margin-top:4px;">
            <div class="section-label" style="margin-bottom:13px;">Database</div>
            <div class="db-actions" style="margin-bottom:8px;"><button class="btn btn-secondary" onclick="openSyncModal()">☁ Configura Sync</button></div>
            <div class="db-actions" style="margin-bottom:8px;">
                <button class="btn btn-secondary" onclick="document.getElementById('importFileInput').click()">⬆ Importa</button>
                <button class="btn btn-secondary" onclick="exportData()">⬇ Esporta</button>
            </div>
            <div class="db-actions" style="margin-bottom:8px;"><button class="btn btn-secondary" onclick="openCsvImport()">📅 Importa CSV/Excel</button></div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
                <span class="section-label" style="margin:0;">Script Apps Script</span>
                <span style="font-size:0.7rem;color:var(--primary);cursor:pointer;" onclick="toggleScriptBox()">mostra/nascondi</span>
            </div>
            <div id="scriptBox" class="hidden" style="margin-top:10px;">
                <div class="csv-help" style="margin-bottom:8px;">Copia su <a href="https://script.google.com" target="_blank" style="color:var(--primary)">script.google.com</a>, distribuisci come App Web (accesso: Chiunque), incolla URL in Configura Sync.</div>
                <textarea readonly onclick="this.select()" style="font-family:'Space Mono',monospace;font-size:0.62rem;min-height:160px;color:var(--text-dim);">const SHEET_NAME = 'StudyHub';
function doGet(e) {
  if (e.parameter.action === 'read') {
    const sheet = getSheet();
    const val = sheet.getRange('A1').getValue();
    return ContentService.createTextOutput(val ? val : '{}').setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService.createTextOutput('{"error":"unknown"}').setMimeType(ContentService.MimeType.JSON);
}
function doPost(e) {
  try {
    const sheet = getSheet();
    const body = e.postData.contents;
    JSON.parse(body);
    sheet.getRange('A1').setValue(body);
    return ContentService.createTextOutput('{"ok":true}').setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput('{"error":"'+err.message+'"}').setMimeType(ContentService.MimeType.JSON);
  }
}
function getSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) sheet = ss.insertSheet(SHEET_NAME);
  return sheet;
}</textarea>
            </div>
        </div>`;
    renderMainCalendar();
    renderColdSpots();
}

function setGlobalView(v){data.globalView=v;weekOffset=0;selectedDayOffset=0;monthOffset=0;save();renderGlobal(document.getElementById('appContent'));}
function toggleFilter(f){
    if(f==='ripasso')data.filterRipasso=!data.filterRipasso;
    else data.filterEsterni=!data.filterEsterni;
    save();renderMainCalendar();
    document.querySelectorAll('.filter-chip').forEach(c=>{
        if(c.classList.contains('chip-ripasso'))c.classList.toggle('on',data.filterRipasso);
        if(c.classList.contains('chip-esterni'))c.classList.toggle('on',data.filterEsterni);
    });
}
function renderMainCalendar(){
    const area=document.getElementById('mainCalendarArea');if(!area)return;
    if(data.globalView==='today')renderTodayWidget(area);
    else if(data.globalView==='dayview')renderDayView(area);
    else if(data.globalView==='week')renderWeekList(area);
    else renderMonthView(area);
}

// ── Today Widget ─────────────────────────────────────────────────────────────
function renderTodayWidget(area){
    const today=todayStr();
    const events=getEventsForDate(today);
    const now=new Date();
    const dateLabel=`${now.getDate()} ${MONTHS_IT[now.getMonth()]} — ${DOW_FULL[now.getDay()]}`;
    const evHtml=events.length?events.map(e=>`
        <div class="topic-card${e.type==='external'?' external-event':''}" style="border-left-color:${e.color}">
            ${e.time?`<span class="topic-time">${e.time}${e.endTime?' – '+e.endTime:''}</span>`:''}
            <span class="topic-name" style="color:${e.color}">${e.name}</span>
            ${e.subject?`<span class="subject-label">${e.subject}</span>`:''}
        </div>`).join(''):`<div class="gcal-no-events" style="padding:10px 0;">Nessuna attività per oggi 🎉</div>`;
    area.innerHTML=`<div class="today-widget">
        <div class="today-widget-title">${dateLabel}</div>
        ${evHtml}
    </div>`;
}

// ── Events helper ────────────────────────────────────────────────────────────
function getEventsForDate(dStr){
    const events=[];
    if(data.filterRipasso){
        Object.keys(data.subjects).forEach(s=>{
            const examM=isExamModeFinal(s);
            data.subjects[s].topics.forEach(t=>{
                if(t.next!==dStr)return;
                if(examM&&t.triage!==3)return;
                const col=t.triage==3?'var(--danger)':(t.triage==2?'var(--warning)':data.subjects[s].color);
                events.push({type:'ripasso',name:t.name,subject:s,color:col,time:null});
            });
        });
    }
    if(data.filterEsterni){
        (data.externalEvents||[]).forEach(e=>{
            if(e.date===dStr)events.push({type:'external',name:e.title,color:'var(--warning)',time:e.time||null,endTime:e.endTime||null});
        });
    }
    events.sort((a,b)=>{if(a.time&&b.time)return a.time.localeCompare(b.time);if(a.time)return-1;if(b.time)return 1;return 0;});
    return events;
}

// ── Day View ─────────────────────────────────────────────────────────────────
function renderDayView(area){
    const today=new Date();today.setHours(0,0,0,0);
    const dow=today.getDay()===0?7:today.getDay();
    const monday=new Date(today);monday.setDate(today.getDate()-(dow-1)+(weekOffset*7));
    const days=[];for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d);}
    const selIdx=Math.max(0,Math.min(6,selectedDayOffset));
    const selDay=days[selIdx],selStr=localDateStr(selDay),todayISO=localDateStr(today);
    const dotsByDay=days.map(d=>getEventsForDate(localDateStr(d)));
    area.innerHTML=`<div class="gcal-wrapper">
        <div class="gcal-nav">
            <div class="gcal-arrow" onclick="changeDayWeek(-1)">❮</div>
            <div class="gcal-nav-label">${MONTHS_IT[monday.getMonth()]} ${monday.getFullYear()}</div>
            <div class="gcal-arrow" onclick="changeDayWeek(1)">❯</div>
        </div>
        <div class="gcal-weekstrip">
            ${days.map((d,i)=>{
                const dStr=localDateStr(d),isT=dStr===todayISO,isSel=i===selIdx;
                const dotHtml=dotsByDay[i].slice(0,4).map(e=>`<div class="gcal-dot" style="background:${e.color}"></div>`).join('');
                return `<div class="gcal-day-btn${isSel?' selected':''}${isT?' today-marker':''}" onclick="selectDay(${i})">
                    <span class="dow">${DOW_SHORT[d.getDay()]}</span>
                    <div class="dom">${d.getDate()}</div>
                    <div class="dot-row">${dotHtml}</div>
                </div>`;
            }).join('')}
        </div>
        <div class="gcal-day-events">
            <div class="gcal-date-header">${selDay.getDate()} ${MONTHS_IT[selDay.getMonth()]} — ${DOW_FULL[selDay.getDay()]}</div>
            ${renderEventCards(selStr)}
        </div>
    </div>`;
}
function renderEventCards(dStr){
    const events=getEventsForDate(dStr);
    if(!events.length)return '<div class="gcal-no-events">Nessuna attività</div>';
    return events.map(e=>`<div class="topic-card${e.type==='external'?' external-event':''}" style="border-left-color:${e.color}">
        ${e.time?`<span class="topic-time">${e.time}${e.endTime?' – '+e.endTime:''}</span>`:''}
        <span class="topic-name" style="color:${e.color}">${e.name}</span>
        ${e.subject?`<span class="subject-label">${e.subject}</span>`:''}
    </div>`).join('');
}
function changeDayWeek(dir){weekOffset+=dir;selectedDayOffset=0;renderMainCalendar();}
function selectDay(idx){selectedDayOffset=idx;renderMainCalendar();}

// ── Week List ────────────────────────────────────────────────────────────────
function renderWeekList(area){
    const today=new Date();today.setHours(0,0,0,0);
    const dow=today.getDay()===0?7:today.getDay();
    const monday=new Date(today);monday.setDate(today.getDate()-(dow-1)+(weekOffset*7));
    const todayISO=localDateStr(today);
    let html=`<div class="gcal-wrapper"><div class="gcal-nav">
        <div class="gcal-arrow" onclick="changeWeekList(-1)">❮</div>
        <div class="gcal-nav-label">DAL ${monday.getDate()}/${monday.getMonth()+1}</div>
        <div class="gcal-arrow" onclick="changeWeekList(1)">❯</div>
    </div><div style="padding:12px 14px;">`;
    for(let i=0;i<7;i++){
        const day=new Date(monday);day.setDate(monday.getDate()+i);
        const dStr=localDateStr(day),isT=dStr===todayISO;
        const evHtml=getEventsForDate(dStr).map(e=>`<div class="topic-card${e.type==='external'?' external-event':''}" style="border-left-color:${e.color}">
            ${e.time?`<span class="topic-time">${e.time}${e.endTime?' – '+e.endTime:''}</span>`:''}
            <span class="topic-name" style="color:${e.color}">${e.name}</span>
            ${e.subject?`<span class="subject-label">${e.subject}</span>`:''}
        </div>`).join('');
        html+=`<div class="day-section"><div class="day-title${isT?' today':''}">
            <span>${day.getDate()} ${day.toLocaleDateString('it-IT',{month:'short'}).toUpperCase()}</span>
            <span style="font-size:0.68rem;opacity:0.42;">${DOW_FULL[day.getDay()]}</span>
        </div>${evHtml||'<p class="gcal-no-events">nessuna attività</p>'}</div>`;
    }
    html+='</div></div>';area.innerHTML=html;
}
function changeWeekList(dir){weekOffset+=dir;renderMainCalendar();}

// ── Month View ───────────────────────────────────────────────────────────────
function renderMonthView(area){
    const today=new Date();today.setHours(0,0,0,0);
    const base=new Date(today.getFullYear(),today.getMonth()+monthOffset,1);
    const year=base.getFullYear(),month=base.getMonth(),todayISO=localDateStr(today);
    const firstDow=base.getDay()===0?7:base.getDay(),dim=new Date(year,month+1,0).getDate();
    let cells='';
    for(let i=1;i<firstDow;i++){const d=new Date(year,month,1-(firstDow-i));cells+=monthCell(d,localDateStr(d),todayISO,true);}
    for(let d=1;d<=dim;d++){const dt=new Date(year,month,d);cells+=monthCell(dt,localDateStr(dt),todayISO,false);}
    const total=(firstDow-1)+dim,rem=total%7===0?0:7-(total%7);
    for(let i=1;i<=rem;i++){const dt=new Date(year,month+1,i);cells+=monthCell(dt,localDateStr(dt),todayISO,true);}
    area.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="gcal-arrow" onclick="changeMonth(-1)">❮</div>
        <div class="gcal-nav-label">${MONTHS_IT[month].toUpperCase()} ${year}</div>
        <div class="gcal-arrow" onclick="changeMonth(1)">❯</div>
    </div>
    <div class="month-dow-header">${['L','M','M','G','V','S','D'].map(d=>`<div class="month-dow-label">${d}</div>`).join('')}</div>
    <div class="month-grid">${cells}</div></div>`;
}
function monthCell(date,dStr,todayISO,other){
    const isT=dStr===todayISO,events=getEventsForDate(dStr);
    const pills=events.slice(0,3).map(e=>{const l=e.time?`${e.time} ${e.name}`:e.name;return `<div class="month-event-pill" style="background:${e.color}">${l}</div>`;}).join('');
    const extra=events.length>3?`<div style="font-size:0.55rem;color:var(--text-dim);text-align:center;">+${events.length-3}</div>`:'';
    return `<div class="month-cell${other?' other-month':''}${isT?' today-cell':''}"><div class="month-cell-num">${date.getDate()}</div>${pills}${extra}</div>`;
}
function changeMonth(dir){monthOffset+=dir;renderMainCalendar();}

// ── History card with drag ────────────────────────────────────────────────────
function buildHistoryCard(t,sub){
    const card=document.createElement('div');
    card.className='card draggable-item';card.draggable=true;card.dataset.id=t.id;
    card.innerHTML=`<div style="font-weight:700;margin-bottom:4px;">${t.name}</div>
        <div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:10px;font-family:'Space Mono',monospace;">
            PROSSIMO: ${fmtDate(t.next)}${(t.repeats||0)>0?`<span style="margin-left:10px;color:var(--danger);">Ripetuto ${t.repeats}✕</span>`:''}
        </div>
        <div class="triage-box">
            <div class="t-dot ${t.triage==1?'active':''}" style="background:var(--success);color:#000" onclick="updateTriageInHistory('${t.id}',1)">BASE</div>
            <div class="t-dot ${t.triage==2?'active':''}" style="background:var(--warning);color:#000" onclick="updateTriageInHistory('${t.id}',2)">COMPLESSO</div>
            <div class="t-dot ${t.triage==3?'active':''}" style="background:var(--danger);color:#fff" onclick="updateTriageInHistory('${t.id}',3)">ESAME</div>
        </div>
        <div class="notes-toggle" onclick="toggleNotes('${t.id}')">▸ Note</div>
        <div id="nb-${t.id}" class="notes-content hidden">
            <textarea id="nt-${t.id}">${t.notes||''}</textarea>
            <button class="btn btn-secondary" style="padding:7px;font-size:0.75rem;margin-top:6px;" onclick="saveNote('${t.id}')">SALVA</button>
        </div>
        <div style="margin-top:10px;display:flex;justify-content:space-between;font-size:0.78rem;">
            <span style="color:var(--primary);cursor:pointer;" onclick="openDateModal('${t.id}')">Ripianifica →</span>
            <span style="color:var(--danger);cursor:pointer;" onclick="deleteTopic('${t.id}')">Elimina</span>
        </div>`;
    card.addEventListener('dragstart',e=>{dragSrc=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
        e.preventDefault();card.classList.remove('drag-over');
        if(!dragSrc||dragSrc===card)return;
        const list=card.parentNode;
        const allCards=[...list.querySelectorAll('.draggable-item')];
        const fromIdx=allCards.indexOf(dragSrc),toIdx=allCards.indexOf(card);
        const topics=data.subjects[data.activeSub].topics;
        // reorder by current order in DOM
        const srcId=dragSrc.dataset.id,dstId=card.dataset.id;
        const srcT=topics.find(x=>x.id===srcId),dstT=topics.find(x=>x.id===dstId);
        const si=topics.indexOf(srcT),di=topics.indexOf(dstT);
        topics.splice(si,1);topics.splice(di,0,srcT);
        save();
        if(fromIdx<toIdx)list.insertBefore(dragSrc,card.nextSibling);
        else list.insertBefore(dragSrc,card);
    });
    return card;
}

// ── Swipe per navigare tra tab ───────────────────────────────────────────────
const TAB_ORDER = ['study','ripasso','calendar','history','notes','stats','pomodoro'];
function initTabSwipe(){
    const content = document.getElementById('tabContent');
    if(!content) return;
    let startX=0, startY=0;
    content.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
    content.addEventListener('touchend',e=>{
        const dx=e.changedTouches[0].clientX-startX;
        const dy=e.changedTouches[0].clientY-startY;
        if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy)*1.5)return; // troppo corto o troppo verticale
        const cur=TAB_ORDER.indexOf(data.activeTab||'study');
        if(dx<0&&cur<TAB_ORDER.length-1)setSubTab(TAB_ORDER[cur+1]); // swipe sx → tab successivo
        else if(dx>0&&cur>0)setSubTab(TAB_ORDER[cur-1]);             // swipe dx → tab precedente
    },{passive:true});
}

// ── Note tab ─────────────────────────────────────────────────────────────────
function renderNotesTab(target, sub) {
    if (!sub.todos) sub.todos = [];
    if (sub.notepad === undefined) sub.notepad = '';

    const pending = sub.todos.filter(t => !t.done);
    const done    = sub.todos.filter(t => t.done);
    const total   = sub.todos.length;

    const todoHtml = sub.todos.map(t => `
        <div class="todo-item" id="todo-${t.id}">
            <input type="checkbox" class="todo-cb" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
            <span class="todo-text${t.done?' done':''}">${escHtml(t.text)}</span>
            <span class="todo-del" onclick="deleteTodo('${t.id}')">✕</span>
        </div>`).join('') || `<div style="opacity:0.25;font-size:0.82rem;padding:10px 0;">Nessuna attività</div>`;

    target.innerHTML = `
        <div class="card">
            <div class="notes-section-label">
                <span>To-do</span>
                <span class="todo-count">${pending.length}/${total} da fare</span>
            </div>
            <div id="todoList">${todoHtml}</div>
            <div class="todo-add-row">
                <input type="text" id="inTodo" placeholder="Aggiungi attività..." onkeydown="if(event.key==='Enter')addTodo()">
                <button class="todo-add-btn" onclick="addTodo()">+</button>
            </div>
            ${done.length > 0 ? `<div style="margin-top:10px;"><span style="font-size:0.7rem;color:var(--text-dim);cursor:pointer;" onclick="clearDoneTodos()">🗑 Rimuovi completate (${done.length})</span></div>` : ''}
        </div>
        <div class="card">
            <div class="notes-section-label"><span>Blocco Note</span><span style="font-size:0.65rem;color:var(--success);cursor:pointer;" onclick="saveNotepad()" id="noteSaveBtn">Salva</span></div>
            <textarea class="note-pad" id="notepadArea" placeholder="Note libere, link, schemi, promemoria permanenti...">${escHtml(sub.notepad)}</textarea>
        </div>`;

    // autosave notepad on blur
    setTimeout(() => {
        const area = document.getElementById('notepadArea');
        if (area) area.addEventListener('blur', saveNotepad);
    }, 0);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addTodo() {
    const inp = document.getElementById('inTodo');
    const text = inp.value.trim(); if (!text) return;
    const sub = data.subjects[data.activeSub];
    if (!sub.todos) sub.todos = [];
    sub.todos.push({ id: Date.now().toString(), text, done: false });
    save(); inp.value = '';
    renderNotesTab(document.getElementById('tabContent'), sub);
    initTabSwipe();
}

function toggleTodo(id) {
    const sub = data.subjects[data.activeSub];
    const t = sub.todos.find(x => x.id === id); if (!t) return;
    t.done = !t.done;
    save();
    // aggiorna solo la riga senza re-render completo
    const row = document.getElementById(`todo-${id}`);
    if (row) {
        row.querySelector('.todo-cb').checked = t.done;
        row.querySelector('.todo-text').classList.toggle('done', t.done);
        // aggiorna contatore
        const pending = sub.todos.filter(x => !x.done).length;
        const el = document.querySelector('.todo-count');
        if (el) el.textContent = `${pending}/${sub.todos.length} da fare`;
    }
}

function deleteTodo(id) {
    const sub = data.subjects[data.activeSub];
    sub.todos = sub.todos.filter(x => x.id !== id);
    save(); renderNotesTab(document.getElementById('tabContent'), sub); initTabSwipe();
}

function clearDoneTodos() {
    const sub = data.subjects[data.activeSub];
    sub.todos = sub.todos.filter(x => !x.done);
    save(); renderNotesTab(document.getElementById('tabContent'), sub); initTabSwipe();
}

function saveNotepad() {
    const area = document.getElementById('notepadArea'); if (!area) return;
    data.subjects[data.activeSub].notepad = area.value;
    save();
    const btn = document.getElementById('noteSaveBtn');
    if (btn) { btn.textContent = '✓ Salvato'; btn.style.color = 'var(--success)'; setTimeout(() => { btn.textContent = 'Salva'; btn.style.color = ''; }, 1500); }
}

// ── Apre archivio e scrolla all'argomento
function openTopicInArchive(topicId){
    setSubTab('history');
    setTimeout(()=>{
        const el=document.querySelector(`[data-id="${topicId}"]`);
        if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow=`0 0 0 2px var(--primary)`;setTimeout(()=>el.style.boxShadow='',2000);}
    },100);
}
function renderStats(target,sub){
    const topics=sub.topics,total=topics.length;
    if(!total){target.innerHTML=`<div class="card" style="text-align:center;opacity:0.35;padding:26px;">Nessun argomento registrato</div>`;return;}
    const today=todayStr();
    const acquired=topics.filter(t=>t.interval>=8).length;
    const uncertain=topics.filter(t=>t.interval>1&&t.interval<8).length;
    const critical=topics.filter(t=>(t.repeats||0)>=2).length;
    const dueToday=topics.filter(t=>t.next<=today).length;
    const examCount=topics.filter(t=>t.triage===3).length;
    const pct=n=>total?Math.round((n/total)*100):0;

    // Sessioni ultimi 14 giorni
    const log=sub.sessionLog||{};
    const sessionDays=[],sessionCounts=[];
    for(let i=13;i>=0;i--){
        const d=new Date();d.setDate(d.getDate()-i);
        const dStr=localDateStr(d);
        sessionDays.push(d.getDate()+'/'+(d.getMonth()+1));
        sessionCounts.push(log[dStr]||0);
    }
    const maxCount=Math.max(...sessionCounts,1);
    const barsHtml=sessionCounts.map((c,i)=>`<div class="session-bar" style="height:${Math.max(4,Math.round((c/maxCount)*56))}px;" title="${sessionDays[i]}: ${c} ripassi"></div>`).join('');
    const labelsHtml=sessionDays.map((d,i)=>i%2===0?`<div class="session-label">${d}</div>`:`<div class="session-label"></div>`).join('');

    target.innerHTML=`
        <div class="card">
            <div class="section-label">Panoramica</div>
            <div class="stat-grid">
                <div class="stat-box"><div class="stat-number" style="color:var(--text)">${total}</div><div class="stat-label">Totale</div></div>
                <div class="stat-box"><div class="stat-number" style="color:var(--warning)">${dueToday}</div><div class="stat-label">Da Ripassare</div></div>
                <div class="stat-box"><div class="stat-number" style="color:var(--success)">${acquired}</div><div class="stat-label">Acquisiti</div></div>
                <div class="stat-box"><div class="stat-number" style="color:var(--danger)">${critical}</div><div class="stat-label">Critici</div></div>
            </div>
        </div>
        <div class="card">
            <div class="section-label">Distribuzione</div>
            ${[['Acquisiti',acquired,'var(--success)'],['In consolidamento',uncertain,'var(--primary)'],['Priorità Esame',examCount,'var(--exam-color)'],['Critici ≥2 Ripeti',critical,'var(--danger)']].map(([l,n,c])=>`
            <div class="progress-bar-wrap">
                <div class="progress-label"><span>${l}</span><span>${n}/${total} (${pct(n)}%)</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct(n)}%;background:${c}"></div></div>
            </div>`).join('')}
        </div>
        <div class="card">
            <div class="section-label">Sessioni — ultime 2 settimane</div>
            <div class="session-bar-wrap">${barsHtml}</div>
            <div class="session-labels">${labelsHtml}</div>
        </div>`;
}

// Registra sessione quando si valuta un argomento
function logSession(subName){
    const sub=data.subjects[subName];if(!sub)return;
    if(!sub.sessionLog)sub.sessionLog={};
    const today=todayStr();
    sub.sessionLog[today]=(sub.sessionLog[today]||0)+1;
}

// ── Pomodoro ─────────────────────────────────────────────────────────────────
function renderPomodoro(){
    const total=pomodoroBreak?5*60:25*60;
    const r=56,circ=2*Math.PI*r;
    const offset=circ*(1-(pomodoroSeconds/total));
    const mm=String(Math.floor(pomodoroSeconds/60)).padStart(2,'0');
    const ss=String(pomodoroSeconds%60).padStart(2,'0');
    return `<div style="text-align:center;">
        <div class="pomo-ring">
            <svg width="130" height="130" viewBox="0 0 130 130">
                <circle class="track" cx="65" cy="65" r="${r}"/>
                <circle class="${pomodoroBreak?'break-progress':'progress'}" cx="65" cy="65" r="${r}"
                    stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
            </svg>
            <div class="pomo-time">${mm}:${ss}<span class="pomo-label">${pomodoroBreak?'PAUSA':'STUDIO'}</span></div>
        </div>
        <div class="pomo-controls">
            <button class="btn btn-secondary" onclick="pomodoroToggle()">${pomodoroRunning?'⏸ Pausa':'▶ Avvia'}</button>
            <button class="btn btn-secondary" onclick="pomodoroReset()">↺ Reset</button>
        </div>
        <div class="pomo-sessions">Sessioni completate oggi: ${pomodoroSession}</div>
    </div>`;
}

function pomodoroToggle(){
    if(pomodoroRunning){clearInterval(pomodoroTimer);pomodoroRunning=false;}
    else{
        pomodoroRunning=true;
        pomodoroTimer=setInterval(()=>{
            pomodoroSeconds--;
            if(pomodoroSeconds<=0){
                clearInterval(pomodoroTimer);pomodoroRunning=false;
                if(!pomodoroBreak){pomodoroSession++;pomodoroBreak=true;pomodoroSeconds=5*60;showToast('🍅 Pomodoro completato! Pausa 5 min');}
                else{pomodoroBreak=false;pomodoroSeconds=25*60;showToast('⏱ Pausa finita! Pronto a studiare?');}
            }
            refreshPomodoro();
        },1000);
    }
    refreshPomodoro();
}
function pomodoroReset(){clearInterval(pomodoroTimer);pomodoroRunning=false;pomodoroSeconds=25*60;pomodoroBreak=false;refreshPomodoro();}
function refreshPomodoro(){
    const pomoDiv=document.getElementById('pomoInner');
    if(pomoDiv)pomoDiv.innerHTML=renderPomodoro();
}

// ── Swipe rate ───────────────────────────────────────────────────────────────
function rate(id,q){
    const t=data.subjects[data.activeSub].topics.find(x=>x.id===id);if(!t)return;
    if(q==='ripeti'){t.repeats=(t.repeats||0)+1;}
    else if(q==='incerto'){t.interval=(t.interval||1)+3;t.next=shiftDate(todayStr(),t.interval);}
    else if(q==='consolida'){t.interval=Math.max(1,t.interval||1)+3;t.next=shiftDate(todayStr(),t.interval);}
    else if(q==='buono'){t.interval=(t.interval||1)+7;t.next=shiftDate(todayStr(),t.interval);}
    if(q!=='ripeti')logSession(data.activeSub);
    save();render();
}

// ── Subject rename/delete ────────────────────────────────────────────────────
function openEditSubjectModal(name){
    document.getElementById('inEditSubName').value=name;
    document.getElementById('editSubOldName').value=name;
    openModal('modalEditSubject');
}
function confirmRenameSubject(){
    const oldName=document.getElementById('editSubOldName').value;
    const newName=document.getElementById('inEditSubName').value.trim();
    if(!newName||newName===oldName){closeModal('modalEditSubject');return;}
    if(data.subjects[newName]){showToast('⚠ Nome già esistente');return;}
    data.subjects[newName]=data.subjects[oldName];
    delete data.subjects[oldName];
    if(data.activeSub===oldName)data.activeSub=newName;
    save();closeModal('modalEditSubject');render();showToast('✓ Rinominata');
}
function confirmDeleteSubject(){
    const name=document.getElementById('editSubOldName').value;
    delete data.subjects[name];
    if(data.activeSub===name){data.activeSub=null;data.isGlobal=true;}
    save();closeModal('modalEditSubject');render();showToast('✓ Materia eliminata');
}

// ── CSV import ───────────────────────────────────────────────────────────────
function openCsvImport(){
    const sel=document.getElementById('csvSubjectTarget');
    sel.innerHTML='<option value="_external">→ Impegni Esterni</option>'+Object.keys(data.subjects).map(s=>`<option value="${s}">${s}</option>`).join('');
    openModal('modalImportCsv');
}
function handleCsvFile(event){const file=event.target.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{document.getElementById('csvRaw').value=e.target.result;openCsvImport();};r.readAsText(file);event.target.value='';}
function importFromCsv(){
    const raw=document.getElementById('csvRaw').value.trim(),target=document.getElementById('csvSubjectTarget').value;
    if(!raw)return;
    let imported=0,errors=0;
    raw.split('\n').filter(l=>l.trim()).forEach(line=>{
        const parts=line.split(',').map(p=>p.trim().replace(/^"|"$/g,''));
        if(parts.length<2){errors++;return;}
        const title=parts[0],dateRaw=parts[1],timeRaw=parts[2]||'';
        let isoDate='',time='';
        if(dateRaw.includes('/')){const p=dateRaw.split('/');if(p.length===3)isoDate=`${p[2].substring(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;}
        else if(dateRaw.includes('-'))isoDate=dateRaw.substring(0,10);
        if(timeRaw.match(/^\d{1,2}:\d{2}/))time=timeRaw.substring(0,5);
        if(!isoDate||!title){errors++;return;}
        if(target==='_external')data.externalEvents.push({title,date:isoDate,time:time||null});
        else if(data.subjects[target])data.subjects[target].topics.push({id:Date.now().toString()+Math.random(),name:title,notes:'',next:isoDate,interval:1,triage:1,repeats:0});
        imported++;
    });
    save();closeModal('modalImportCsv');render();showToast(`✓ Importati ${imported} eventi${errors?`, ${errors} errori`:''}`);
}

// ── Core funcs ───────────────────────────────────────────────────────────────
function addNewSubject(){
    const val=document.getElementById('inSubName').value.trim();if(!val)return;
    data.subjects[val]={topics:[],color:colors[Object.keys(data.subjects).length%colors.length],examDate:null,examModeManual:false,examModeOverride:false,sessionLog:{},todos:[],notepad:''};
    save();closeModal('modalNewSubject');document.getElementById('inSubName').value='';setView('subject',val);
}
function confirmExamDate(){
    const val=document.getElementById('inExamDate').value;if(!val.includes('/'))return;
    const p=val.split('/');
    data.subjects[data.activeSub].examDate=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    data.subjects[data.activeSub].examModeOverride=false;
    save();closeModal('modalExamDate');render();
}
function addTopic(){
    const name=document.getElementById('inT').value.trim();if(!name)return;
    data.subjects[data.activeSub].topics.push({id:Date.now().toString(),name,notes:document.getElementById('inN').value,next:shiftDate(new Date(),1),interval:1,triage:data.triage,repeats:0});
    save();setSubTab('study');showToast('✓ Registrato');
}
function updateTriageInHistory(id,n){data.subjects[data.activeSub].topics.find(x=>x.id===id).triage=n;save();render();}
function openDateModal(id){document.getElementById('editTopicId').value=id;openModal('modalEditDate');}
function confirmManualDate(){
    const id=document.getElementById('editTopicId').value,val=document.getElementById('inNewDate').value;
    if(!val.includes('/'))return;
    const p=val.split('/');
    data.subjects[data.activeSub].topics.find(x=>x.id===id).next=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    save();closeModal('modalEditDate');render();
}
function addExternalEvent(){
    const title=document.getElementById('extTitle').value.trim(),d=document.getElementById('extDate').value;
    const time=document.getElementById('extTime').value||null,endTime=document.getElementById('extEndTime').value.trim()||null;
    if(!title||!d)return;
    const p=d.split('/');
    data.externalEvents.push({title,date:`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`,time,endTime});
    save();closeModal('modalExt');['extTitle','extDate','extEndTime'].forEach(id=>document.getElementById(id).value='');document.getElementById('extTime').value='';render();
}
let _deleteTargetId=null;
function deleteTopic(id){
    _deleteTargetId=id;
    document.getElementById('confirmDeleteBtn').onclick=()=>{
        data.subjects[data.activeSub].topics=data.subjects[data.activeSub].topics.filter(x=>x.id!==_deleteTargetId);
        save();closeModal('modalConfirmDelete');render();
    };
    openModal('modalConfirmDelete');
}
function setTriage(n){data.triage=n;setSubTab('study');}
function toggleNotes(id){document.getElementById(`nb-${id}`).classList.toggle('hidden');}
function saveNote(id){data.subjects[data.activeSub].topics.find(x=>x.id===id).notes=document.getElementById(`nt-${id}`).value;save();showToast('✓ Note salvate');}
function applyImprevisto(){const today=todayStr();data.subjects[data.activeSub].topics.forEach(t=>{if(t.next<=today)t.next=shiftDate(today,1);});save();render();showToast('✓ Ripassi spostati di 1 giorno');}
function renderColdSpots(){
    const spots=[];
    Object.keys(data.subjects).forEach(s=>{data.subjects[s].topics.forEach(t=>{if((t.repeats||0)>=2)spots.push({n:t.name,s,f:t.repeats});});});
    const sec=document.getElementById('coldSpotsSection');
    if(sec&&spots.length)sec.innerHTML=`<div class="cold-card"><div class="cold-title">⚠ Criticità rilevate</div>${spots.map(x=>`<div class="cold-item"><span>${x.n} <span style="opacity:0.4;font-size:0.72rem;">(${x.s})</span></span><span style="color:var(--danger);font-family:'Space Mono',monospace;font-size:0.75rem;">${x.f}✕</span></div>`).join('')}</div>`;
}
function exportData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`studyhub_backup_${todayStr()}.json`;a.click();URL.revokeObjectURL(url);showToast('✓ Database esportato');}
function handleImport(event){const file=event.target.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const imp=JSON.parse(e.target.result);if(!imp.subjects)throw 0;data=imp;save();render();showToast('✓ Database importato');}catch{showToast('⚠ File non valido');}};r.readAsText(file);event.target.value='';}
function toggleScriptBox(){const box=document.getElementById('scriptBox');if(box)box.classList.toggle('hidden');}

// ── Sync ─────────────────────────────────────────────────────────────────────
const SYNC_KEY='studyhub_sync_url';
let syncUrl=localStorage.getItem(SYNC_KEY)||'',syncInProgress=false;
function getSyncStatus(){return localStorage.getItem('studyhub_sync_status')||'none';}
function setSyncStatus(s){localStorage.setItem('studyhub_sync_status',s);updateSyncBtn(s);}
function updateSyncBtn(status){
    const btn=document.getElementById('syncBtn'),dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
    if(!btn)return;btn.className='sync-btn';dot.className='sync-status-dot';
    if(!syncUrl){lbl.textContent='Configura';return;}
    if(status==='ok'){lbl.textContent='✓ Sync';dot.classList.add('connected');}
    else if(status==='error'){lbl.textContent='⚠ Sync';dot.classList.add('error');}
    else lbl.textContent='Sync';
}
function syncNow(){if(!syncUrl){openSyncModal();return;}if(syncInProgress)return;doSync();}
async function doSync(){
    syncInProgress=true;setSyncStatus('syncing');
    try{
        const res=await fetch(`${syncUrl}?action=read`,{method:'GET'});
        if(!res.ok)throw new Error('HTTP '+res.status);
        const remote=await res.json();
        const localTs=data.lastModified||0,remoteTs=remote.lastModified||0;
        let merged=remoteTs>localTs?{...remote,isGlobal:data.isGlobal,activeSub:data.activeSub,globalView:data.globalView,filterRipasso:data.filterRipasso,filterEsterni:data.filterEsterni}:data;
        merged.lastModified=Date.now();
        const wr=await fetch(syncUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(merged)});
        if(!wr.ok)throw new Error('Write failed');
        data=merged;save();render();setSyncStatus('ok');
        showToast(`✓ Sincronizzato — ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`);
    }catch(e){setSyncStatus('error');showToast('⚠ Errore sync: '+(e.message||'controlla URL'));}
    finally{syncInProgress=false;}
}
function openSyncModal(){
    const body=document.getElementById('syncModalBody'),connected=!!syncUrl;
    body.innerHTML=connected?`
        <div class="sync-info-row"><span class="sync-status-dot connected"></span><span class="sync-info-text">${syncUrl.length>54?syncUrl.substring(0,54)+'…':syncUrl}</span></div>
        <p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:16px;line-height:1.6;">Connesso. Vince sempre il timestamp più recente.</p>
        <button class="btn btn-primary" style="margin-bottom:8px;" onclick="closeModal('modalSync');doSync()">↻ SINCRONIZZA ORA</button>
        <button class="btn btn-secondary" onclick="changeSyncUrl()">CAMBIA URL</button>
        <button class="btn btn-secondary" style="margin-top:6px;" onclick="disconnectSync()">DISCONNETTI</button>
        <button class="btn btn-secondary" style="margin-top:6px;" onclick="closeModal('modalSync')">CHIUDI</button>
    `:`
        <p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:14px;line-height:1.65;">Incolla l'URL del Google Apps Script per sincronizzare tra dispositivi.</p>
        <input type="text" id="inSyncUrl" placeholder="https://script.google.com/macros/s/…/exec">
        <div class="modal-btns"><button class="btn btn-primary" onclick="saveSyncUrl()">CONNETTI</button><button class="btn btn-secondary" onclick="closeModal('modalSync')">ANNULLA</button></div>`;
    openModal('modalSync');
}
function changeSyncUrl(){document.getElementById('syncModalBody').innerHTML=`<p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:12px;">Nuovo URL:</p><input type="text" id="inSyncUrl" placeholder="https://script.google.com/macros/s/…/exec"><div class="modal-btns"><button class="btn btn-primary" onclick="saveSyncUrl()">SALVA</button><button class="btn btn-secondary" onclick="openSyncModal()">INDIETRO</button></div>`;}
function saveSyncUrl(){const val=document.getElementById('inSyncUrl').value.trim();if(!val||!val.startsWith('https://')){showToast('⚠ URL non valido');return;}syncUrl=val;localStorage.setItem(SYNC_KEY,syncUrl);closeModal('modalSync');updateSyncBtn('none');doSync();}
function disconnectSync(){syncUrl='';localStorage.removeItem(SYNC_KEY);localStorage.removeItem('studyhub_sync_status');closeModal('modalSync');updateSyncBtn('none');showToast('✓ Disconnesso');}

setInterval(()=>{if(syncUrl&&!syncInProgress)doSync();},5*60*1000);
if(syncUrl)setTimeout(doSync,1500);

render();
updateSyncBtn(getSyncStatus());
</script>
